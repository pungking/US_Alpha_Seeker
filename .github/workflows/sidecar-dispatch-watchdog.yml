# BRIDGE WATCHDOG (US_Alpha_Seeker repo)
# - Monitors sidecar freshness in pungking/alpha-exec-engine.
# - If stale, dispatches sidecar dry-run workflow as fallback.
# - Triggered manually or by its own weekday UTC schedule.
name: Sidecar Dispatch Watchdog

on:
  schedule:
    # UTC weekday cadence aligned with sidecar dry-run monitoring window.
    - cron: '8,23,38,53 13-21 * * 1-5'
  workflow_dispatch:

concurrency:
  group: sidecar-dispatch-watchdog-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bridge-watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TARGET_REPO: ${{ vars.SIDECAR_DISPATCH_REPO || 'pungking/alpha-exec-engine' }}
      TARGET_WORKFLOW: ${{ vars.SIDECAR_WATCHDOG_TARGET_WORKFLOW || 'dry-run.yml' }}
      TARGET_BRANCH: ${{ vars.SIDECAR_WATCHDOG_BRANCH || 'main' }}
      TARGET_RUN_VERIFY_MODE: ${{ vars.SIDECAR_BRIDGE_VERIFY_MODE || 'auto' }}
      TARGET_RUN_ALLOW_ENTRY_OUTSIDE_RTH: ${{ vars.SIDECAR_BRIDGE_ALLOW_ENTRY_OUTSIDE_RTH || 'false' }}
      TARGET_RUN_ACTIONABLE_INCLUDE_SPECULATIVE_BUY: ${{ vars.SIDECAR_BRIDGE_ACTIONABLE_INCLUDE_SPECULATIVE_BUY || 'false' }}
      TARGET_RUN_FORCE_SEND_ONCE: ${{ vars.SIDECAR_BRIDGE_FORCE_SEND_ONCE || 'false' }}
      STALE_MINUTES: ${{ vars.SIDECAR_BRIDGE_STALE_MINUTES || vars.SIDECAR_WATCHDOG_STALE_MINUTES || '25' }}
      DISPATCH_TOKEN: ${{ vars.GITHUB_TOKEN || secrets.MCP_GITHUB_TOKEN || secrets.GH_PAT || secrets.SIDECAR_DISPATCH_TOKEN || github.token }}
    steps:
      - name: Validate dispatch token
        run: |
          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "[ERROR] dispatch token is missing (GITHUB_TOKEN|MCP_GITHUB_TOKEN|GH_PAT|SIDECAR_DISPATCH_TOKEN)."
            exit 1
          fi

      - name: Evaluate sidecar freshness and dispatch fallback
        id: eval
        uses: actions/github-script@v8
        with:
          github-token: ${{ env.DISPATCH_TOKEN }}
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            const parseNumber = (raw, fallback, min, max) => {
              const n = Number(raw);
              if (!Number.isFinite(n)) return fallback;
              return Math.max(min, Math.min(max, n));
            };

            const parseBool = (raw, fallback) => {
              if (!raw || !String(raw).trim()) return fallback;
              const normalized = String(raw).trim().toLowerCase();
              if (["1", "true", "yes", "y", "on"].includes(normalized)) return true;
              if (["0", "false", "no", "n", "off"].includes(normalized)) return false;
              return fallback;
            };
            const parseChoice = (raw, allowed, fallback) => {
              const normalized = String(raw || "").trim().toLowerCase();
              if (!normalized) return fallback;
              return allowed.has(normalized) ? normalized : fallback;
            };

            const targetRepoRaw = String(process.env.TARGET_REPO || "pungking/alpha-exec-engine").trim();
            const repoMatch = targetRepoRaw.match(/^([^/]+)\/([^/]+)$/);
            if (!repoMatch) {
              core.setFailed(`invalid TARGET_REPO: ${targetRepoRaw}`);
              return;
            }

            const targetOwner = repoMatch[1];
            const targetRepo = repoMatch[2];
            const targetWorkflow = String(process.env.TARGET_WORKFLOW || "dry-run.yml").trim() || "dry-run.yml";
            const targetBranch = String(process.env.TARGET_BRANCH || "main").trim() || "main";
            const verifyModeAllowed = new Set(["safe_default", "submit_pass", "guard_skip_pass", "auto"]);
            const requestedVerifyMode = parseChoice(
              process.env.TARGET_RUN_VERIFY_MODE,
              verifyModeAllowed,
              "auto"
            );
            const requestedAllowOutsideRth = parseBool(
              process.env.TARGET_RUN_ALLOW_ENTRY_OUTSIDE_RTH,
              false
            );
            const requestedIncludeSpeculative = parseBool(
              process.env.TARGET_RUN_ACTIONABLE_INCLUDE_SPECULATIVE_BUY,
              false
            );
            const requestedForceSendOnce = parseBool(
              process.env.TARGET_RUN_FORCE_SEND_ONCE,
              false
            );
            const staleMinutes = parseNumber(process.env.STALE_MINUTES, 25, 15, 360);
            const activeStatuses = new Set(["queued", "in_progress", "waiting", "pending", "requested"]);

            const runsResp = await github.rest.actions.listWorkflowRuns({
              owner: targetOwner,
              repo: targetRepo,
              workflow_id: targetWorkflow,
              branch: targetBranch,
              per_page: 20
            });
            const runs = Array.isArray(runsResp?.data?.workflow_runs) ? runsResp.data.workflow_runs : [];
            const eligible = runs.filter((run) =>
              ["schedule", "workflow_dispatch", "repository_dispatch"].includes(String(run.event || ""))
            );
            const latest = eligible[0] || null;

            let dispatch = false;
            let reason = "healthy_recent_run";
            let ageMin = null;
            let latestStatus = "n/a";
            let latestEvent = "n/a";
            let latestConclusion = "n/a";
            let latestRunId = "n/a";
            let dispatchVerifyModeSent = "not_dispatched";
            let dispatchInputFallback = "none";

            if (!latest) {
              dispatch = true;
              reason = "no_eligible_runs";
            } else {
              latestRunId = String(latest.id);
              latestStatus = String(latest.status || "").toLowerCase();
              latestEvent = String(latest.event || "");
              latestConclusion = String(latest.conclusion || "n/a");
              const createdMs = Date.parse(String(latest.created_at || ""));
              if (Number.isFinite(createdMs)) {
                ageMin = Number(((Date.now() - createdMs) / 60000).toFixed(1));
              }

              if (activeStatuses.has(latestStatus)) {
                dispatch = false;
                reason = "latest_run_active";
              } else if (ageMin == null) {
                dispatch = true;
                reason = "latest_created_at_invalid";
              } else if (ageMin > staleMinutes) {
                dispatch = true;
                reason = "latest_run_stale";
              }
            }

            if (dispatch) {
              const inputs = {
                run_verify_mode: requestedVerifyMode,
                run_allow_entry_outside_rth: requestedAllowOutsideRth ? "true" : "false",
                run_actionable_include_speculative_buy: requestedIncludeSpeculative ? "true" : "false",
                run_force_send_once: requestedForceSendOnce ? "true" : "false"
              };
              let dispatchedVerifyMode = requestedVerifyMode;
              let inputFallback = "none";
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: targetOwner,
                  repo: targetRepo,
                  workflow_id: targetWorkflow,
                  ref: targetBranch,
                  inputs
                });
              } catch (error) {
                const message = String(error?.message || error || "");
                const unexpected = message.includes("Unexpected inputs provided");
                const unsupportedKeys = [...message.matchAll(/'([^']+)'/g)]
                  .map((match) => match[1])
                  .filter((key) => Object.prototype.hasOwnProperty.call(inputs, key));
                if (!unexpected || unsupportedKeys.length === 0) {
                  throw error;
                }
                for (const key of unsupportedKeys) {
                  delete inputs[key];
                }
                if (unsupportedKeys.includes("run_verify_mode")) {
                  dispatchedVerifyMode = "legacy_default";
                }
                inputFallback = unsupportedKeys.join(",");
                core.warning(
                  `[BRIDGE_WATCHDOG_WARN] target workflow rejected input(s): ${inputFallback}; retrying without them`
                );
                await github.rest.actions.createWorkflowDispatch({
                  owner: targetOwner,
                  repo: targetRepo,
                  workflow_id: targetWorkflow,
                  ref: targetBranch,
                  inputs
                });
              }
              dispatchVerifyModeSent = dispatchedVerifyMode;
              dispatchInputFallback = inputFallback;
            }
            core.setOutput("dispatch_verify_mode_requested", requestedVerifyMode);
            core.setOutput("dispatch_verify_mode_sent", dispatchVerifyModeSent);
            core.setOutput("dispatch_input_fallback", dispatchInputFallback);

            const summaryLine = [
              `[BRIDGE_WATCHDOG] target=${targetOwner}/${targetRepo}`,
              `workflow=${targetWorkflow}`,
              `branch=${targetBranch}`,
              `dispatch=${dispatch}`,
              `reason=${reason}`,
              `staleMin=${staleMinutes}`,
              `latestRunId=${latestRunId}`,
              `latestStatus=${latestStatus}`,
              `latestEvent=${latestEvent}`,
              `latestConclusion=${latestConclusion}`,
              `latestAgeMin=${ageMin == null ? "n/a" : ageMin}`,
              `verifyModeReq=${requestedVerifyMode}`,
              `verifyModeSent=${dispatchVerifyModeSent}`,
              `inputFallback=${dispatchInputFallback}`
            ].join(" ");
            core.notice(summaryLine);

            await core.summary
              .addHeading("Sidecar Dispatch Watchdog")
              .addRaw("```text\n")
              .addRaw(`${summaryLine}\n`)
              .addRaw("```\n")
              .write();
