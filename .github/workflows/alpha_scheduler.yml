
name: US Alpha Seeker Autopilot

on:
  schedule:
    # Run at 10:30 UTC and 11:30 UTC every weekday (Mon-Fri)
    # 10:30 UTC = 19:30 KST (Start time for DST 20:30 delivery)
    # 11:30 UTC = 20:30 KST (Start time for STD 21:30 delivery)
    - cron: '30 10,11 * * 1-5'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  run-autopilot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # CRITICAL: Cache disabled to support manual uploads without package-lock.json
          # cache: 'npm' 

      - name: Install Dependencies
        # Use npm install to generate lockfile if missing
        run: npm install

      - name: Execute Alpha Seeker Engine
        env:
          # App URL
          APP_URL: "https://us-alpha-seeker.vercel.app"
          
          # Google Drive OAuth (Required for Headless Auth)
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          
          # Force Run on Manual Trigger (Bypasses Time Check)
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        
        run: npm run autopilot
