name: Knowledge Intake Pipeline

on:
  schedule:
    # Weekdays 09:40 UTC (18:40 KST)
    - cron: "40 9 * * 1-5"
  workflow_dispatch:

concurrency:
  group: knowledge-intake-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  intake-pipeline:
    runs-on: ${{ vars.KNOWLEDGE_PIPELINE_RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: 15
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_WORK_LIST: ${{ vars.NOTION_WORK_LIST }}

      # state machine
      KNOWLEDGE_PIPELINE_PENDING_STATUS: ${{ vars.KNOWLEDGE_PIPELINE_PENDING_STATUS || '승인대기' }}
      KNOWLEDGE_PIPELINE_APPROVED_STATUS: ${{ vars.KNOWLEDGE_PIPELINE_APPROVED_STATUS || '승인' }}
      KNOWLEDGE_PIPELINE_REFLECT_STATUS: ${{ vars.KNOWLEDGE_PIPELINE_REFLECT_STATUS || '코드반영' }}
      KNOWLEDGE_PIPELINE_CATEGORY_FILTER: ${{ vars.KNOWLEDGE_PIPELINE_CATEGORY_FILTER || 'MCP' }}
      KNOWLEDGE_PIPELINE_SOURCE_MODE: ${{ vars.KNOWLEDGE_PIPELINE_SOURCE_MODE || 'notion' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_JSON_PATH: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_JSON_PATH || 'state/notebooklm-intake.json' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_REQUIRED: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_REQUIRED || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_ENABLED || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_REQUIRED: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_REQUIRED || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_OVERWRITE: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_OVERWRITE || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_COMMAND: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_COMMAND || 'npx' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_ARGS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_ARGS || '["-y","notebooklm-mcp"]' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_TIMEOUT_MS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_TIMEOUT_MS || '300000' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_ID: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_ID || '' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_URL: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_URL || '' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_QUERY: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_QUERY || '' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_BOOTSTRAP_URLS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_BOOTSTRAP_URLS || '' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_QUESTIONS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_QUESTIONS || '' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MAX_ITEMS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MAX_ITEMS || '8' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_SHOW_BROWSER: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_SHOW_BROWSER || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_ENABLED || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_MODE: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_MODE || 'seed_pack' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_OVERWRITE: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_OVERWRITE || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_SEED_LIMIT: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_SEED_LIMIT || '20' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_PACK_PATH: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_PACK_PATH || 'docs/NOTEBOOKLM_US_STOCK_RESEARCH_PACK_2026-04-10.md' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_PLAYBOOK_PATH: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_PLAYBOOK_PATH || 'docs/MARKET_INTEL_AUTOTRADING_UPLIFT_PLAYBOOK_2026-04-10.md' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # safe default: queue-only. set true after stable 운영.
      KNOWLEDGE_PIPELINE_APPLY: ${{ vars.KNOWLEDGE_PIPELINE_APPLY || 'false' }}
      KNOWLEDGE_PIPELINE_REQUIRED: ${{ vars.KNOWLEDGE_PIPELINE_REQUIRED || 'false' }}
      KNOWLEDGE_PIPELINE_LIMIT: ${{ vars.KNOWLEDGE_PIPELINE_LIMIT || '20' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_APPLY: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_APPLY || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_REQUIRED: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_REQUIRED || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_DRY_RUN: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_DRY_RUN || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_NOTE_PATH: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_NOTE_PATH || '99_Automation/Knowledge Approved Queue.md' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_APPLY: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_APPLY || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_HUB_PATH: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_HUB_PATH || '99_Automation/NotebookLM/NotebookLM_Intake_Graph_Hub.md' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ITEM_DIR: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ITEM_DIR || '99_Automation/NotebookLM/Intake' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_PACK_NOTE: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_PACK_NOTE || '99_Automation/NotebookLM_US_Stock_Research_Pack_2026-04-10.md' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_PLAYBOOK_NOTE: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_PLAYBOOK_NOTE || '99_Automation/Market_Intel_AutoTrading_Uplift_Playbook_2026-04-10.md' }}
      OBSIDIAN_BASE_URL: ${{ vars.OBSIDIAN_BASE_URL || 'http://127.0.0.1:27123' }}
      OBSIDIAN_API_KEY: ${{ secrets.OBSIDIAN_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Collect from NotebookLM MCP (optional)
        run: npm run ops:knowledge:notebooklm

      - name: Build NotebookLM intake seed (optional)
        run: npm run ops:knowledge:bridge

      - name: Run knowledge intake pipeline
        run: npm run ops:knowledge:pipeline

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-intake-pipeline
          path: |
            state/knowledge-intake-pipeline-report.json
            state/knowledge-approved-queue.json
            state/knowledge-approved-queue.md
            state/knowledge-approved-queue-obsidian.md
            state/notebooklm-intake.json
            state/notebooklm-mcp-collect-report.json
          if-no-files-found: warn
