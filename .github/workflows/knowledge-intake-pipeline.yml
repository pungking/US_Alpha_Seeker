name: Knowledge Intake Pipeline

on:
  schedule:
    # Weekdays 09:40 UTC (18:40 KST)
    - cron: "40 9 * * 1-5"
  workflow_dispatch:

concurrency:
  group: knowledge-notebooklm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  intake-pipeline:
    runs-on: ${{ vars.KNOWLEDGE_PIPELINE_RUNS_ON_JSON != '' && fromJSON(vars.KNOWLEDGE_PIPELINE_RUNS_ON_JSON) || vars.KNOWLEDGE_PIPELINE_RUNS_ON || 'ubuntu-latest' }}
    timeout-minutes: ${{ fromJSON(vars.KNOWLEDGE_PIPELINE_JOB_TIMEOUT_MIN || '45') }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_WORK_LIST: ${{ vars.NOTION_WORK_LIST }}

      # state machine
      KNOWLEDGE_PIPELINE_PENDING_STATUS: ${{ vars.KNOWLEDGE_PIPELINE_PENDING_STATUS || '승인대기' }}
      KNOWLEDGE_PIPELINE_APPROVED_STATUS: ${{ vars.KNOWLEDGE_PIPELINE_APPROVED_STATUS || '승인' }}
      KNOWLEDGE_PIPELINE_REFLECT_STATUS: ${{ vars.KNOWLEDGE_PIPELINE_REFLECT_STATUS || '코드반영' }}
      KNOWLEDGE_PIPELINE_CATEGORY_FILTER: ${{ vars.KNOWLEDGE_PIPELINE_CATEGORY_FILTER || 'MCP' }}
      KNOWLEDGE_PIPELINE_SOURCE_MODE: ${{ vars.KNOWLEDGE_PIPELINE_SOURCE_MODE || 'notion' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_JSON_PATH: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_JSON_PATH || 'state/notebooklm-intake.json' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_REQUIRED: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_REQUIRED || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_ENABLED || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_REQUIRED: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_REQUIRED || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_OVERWRITE: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_OVERWRITE || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_COMMAND: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_COMMAND || 'npx' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_ARGS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_ARGS || '["-y","notebooklm-mcp"]' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_TIMEOUT_MS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_TIMEOUT_MS || '300000' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_BROWSER_TIMEOUT_MS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_BROWSER_TIMEOUT_MS || '90000' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MAX_RUNTIME_MS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MAX_RUNTIME_MS || '1440000' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MIN_QUESTION_BUDGET_MS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MIN_QUESTION_BUDGET_MS || '90000' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_ANSWER_MAX_CHARS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_ANSWER_MAX_CHARS || '4200' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_ID: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_ID || '' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_URL: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_URL || '' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_QUERY: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_NOTEBOOK_QUERY || '' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_INVALID_STREAK_ALERT_THRESHOLD: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_INVALID_STREAK_ALERT_THRESHOLD || '2' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_INVALID_STREAK_ALERT_FAIL: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_INVALID_STREAK_ALERT_FAIL || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_AUTH_HARD_FAIL: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_AUTH_HARD_FAIL || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_AUTH_AUTO_SETUP: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_AUTH_AUTO_SETUP || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_AUTH_AUTO_SETUP_SHOW_BROWSER: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_AUTH_AUTO_SETUP_SHOW_BROWSER || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_RETRY_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_RETRY_ENABLED || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_RETRY_TRIGGER_STREAK: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_RETRY_TRIGGER_STREAK || '2' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_RETRY_SIMPLE_MAX_ITEMS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_RETRY_SIMPLE_MAX_ITEMS || '1' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_RETRY_SIMPLE_QUESTIONS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_RETRY_SIMPLE_QUESTIONS || '' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_RETRY_AUTH_SHOW_BROWSER: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_RETRY_AUTH_SHOW_BROWSER || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_REUSE_SESSION: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_REUSE_SESSION || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_CALL_RETRY_ON_TIMEOUT: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_CALL_RETRY_ON_TIMEOUT || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_CALL_RETRY_MAX: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_CALL_RETRY_MAX || '1' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_CALL_RETRY_BACKOFF_MS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_CALL_RETRY_BACKOFF_MS || '1500' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_BOOTSTRAP_URLS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_BOOTSTRAP_URLS || '' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_QUESTIONS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_QUESTIONS || '' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_MAX_ITEMS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_MAX_ITEMS || '2' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_ROTATE_QUESTIONS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_ROTATE_QUESTIONS || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_QUESTION_CURSOR_PATH: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_QUESTION_CURSOR_PATH || 'state/notebooklm-mcp-question-cursor.json' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_SHOW_BROWSER: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_SHOW_BROWSER || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_DROP_INVALID_ITEMS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_DROP_INVALID_ITEMS || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_ENABLED || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_MODE: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_MODE || 'seed_pack' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_OVERWRITE: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_BRIDGE_OVERWRITE || 'false' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_SEED_LIMIT: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_SEED_LIMIT || '20' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_PACK_PATH: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_PACK_PATH || 'docs/NOTEBOOKLM_US_STOCK_RESEARCH_PACK_2026-04-10.md' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_PLAYBOOK_PATH: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_PLAYBOOK_PATH || 'docs/MARKET_INTEL_AUTOTRADING_UPLIFT_PLAYBOOK_2026-04-10.md' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # safe default: queue-only. set true after stable 운영.
      KNOWLEDGE_PIPELINE_APPLY: ${{ vars.KNOWLEDGE_PIPELINE_APPLY || 'false' }}
      KNOWLEDGE_PIPELINE_REQUIRED: ${{ vars.KNOWLEDGE_PIPELINE_REQUIRED || 'false' }}
      KNOWLEDGE_PIPELINE_LIMIT: ${{ vars.KNOWLEDGE_PIPELINE_LIMIT || '20' }}
      KNOWLEDGE_PIPELINE_ENFORCE_STRICT: ${{ vars.KNOWLEDGE_PIPELINE_ENFORCE_STRICT || 'true' }}
      KNOWLEDGE_PIPELINE_REQUIRE_SELF_HOSTED: ${{ vars.KNOWLEDGE_PIPELINE_REQUIRE_SELF_HOSTED || 'false' }}
      KNOWLEDGE_PIPELINE_QUEUE_KEEP_LAST_GOOD_ON_EMPTY: ${{ vars.KNOWLEDGE_PIPELINE_QUEUE_KEEP_LAST_GOOD_ON_EMPTY || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_APPLY: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_APPLY || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_REQUIRED: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_REQUIRED || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_DRY_RUN: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_DRY_RUN || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_NOTE_PATH: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_NOTE_PATH || '99_Automation/Knowledge Approved Queue.md' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_APPLY: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_APPLY || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_HUB_PATH: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_HUB_PATH || '99_Automation/NotebookLM/NotebookLM_Intake_Graph_Hub.md' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ITEM_DIR: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ITEM_DIR || '99_Automation/NotebookLM/Intake' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_PACK_NOTE: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_PACK_NOTE || '99_Automation/NotebookLM_US_Stock_Research_Pack_2026-04-10.md' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_PLAYBOOK_NOTE: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_PLAYBOOK_NOTE || '99_Automation/Market_Intel_AutoTrading_Uplift_Playbook_2026-04-10.md' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_MANIFEST_PATH: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_MANIFEST_PATH || '99_Automation/NotebookLM/Intake/_meta/generated-manifest.json' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_KOREAN_TITLE: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_KOREAN_TITLE || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_HUB_KEEP_BASE: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_HUB_KEEP_BASE || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_HUB_LINK_HUB: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_HUB_LINK_HUB || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_HUB_LINK_THEMES: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_HUB_LINK_THEMES || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_HUB_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_HUB_ENABLED || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_CORE_DOCS_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_CORE_DOCS_ENABLED || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_CROSSLINK_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_CROSSLINK_ENABLED || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_LEGACY_CLEANUP: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_LEGACY_CLEANUP || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_STALE_CLEANUP: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_STALE_CLEANUP || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ARCHIVE_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ARCHIVE_ENABLED || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ARCHIVE_DIR: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ARCHIVE_DIR || '99_Automation/NotebookLM/Archive' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ARCHIVE_RETENTION_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ARCHIVE_RETENTION_ENABLED || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ARCHIVE_RETENTION_DAYS: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ARCHIVE_RETENTION_DAYS || '90' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ARCHIVE_RETENTION_MAX_DELETE: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ARCHIVE_RETENTION_MAX_DELETE || '200' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ACCUMULATE_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ACCUMULATE_ENABLED || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ACCUMULATE_MAX: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_ACCUMULATE_MAX || '200' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_QUOTA_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_QUOTA_ENABLED || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_QUOTA_MIN: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_QUOTA_MIN || '1' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_RUN_LIMIT: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_RUN_LIMIT || '4' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_TARGETS: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_THEME_TARGETS || 'Macro & Rates,Volatility & Risk,Sector & Trend,Earnings & Fundamentals,Policy & Compliance' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_DROP_INVALID: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_DROP_INVALID || 'true' }}
      KNOWLEDGE_PIPELINE_NOTEBOOKLM_SANITIZED_MAX_CHARS: ${{ vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_SANITIZED_MAX_CHARS || '7000' }}
      KNOWLEDGE_MARKDOWN_QUALITY_REQUIRED: ${{ vars.KNOWLEDGE_MARKDOWN_QUALITY_REQUIRED || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_FRIENDLY_FILENAME_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_FRIENDLY_FILENAME_ENABLED || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_RENAME_LEGACY_NOISY_FILENAMES: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_RENAME_LEGACY_NOISY_FILENAMES || 'true' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_REBUILD_FILENAMES: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_REBUILD_FILENAMES || 'false' }}
      KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_RESET_MODE: ${{ vars.KNOWLEDGE_PIPELINE_OBSIDIAN_GRAPH_RESET_MODE || 'off' }}
      KNOWLEDGE_PIPELINE_ALERT_NOTIFY_ON: ${{ vars.KNOWLEDGE_PIPELINE_ALERT_NOTIFY_ON || 'fail' }}
      KNOWLEDGE_PIPELINE_HANDOFF_ENABLED: ${{ vars.KNOWLEDGE_PIPELINE_HANDOFF_ENABLED || 'true' }}
      KNOWLEDGE_PIPELINE_HANDOFF_REQUIRED: ${{ vars.KNOWLEDGE_PIPELINE_HANDOFF_REQUIRED || 'false' }}
      KNOWLEDGE_PIPELINE_HANDOFF_REQUIRE_PASS: ${{ vars.KNOWLEDGE_PIPELINE_HANDOFF_REQUIRE_PASS || 'true' }}
      KNOWLEDGE_PIPELINE_HANDOFF_MAX_AGE_MIN: ${{ vars.KNOWLEDGE_PIPELINE_HANDOFF_MAX_AGE_MIN || '1440' }}
      KNOWLEDGE_PIPELINE_HANDOFF_REQUIRE_EXEC_READY: ${{ vars.KNOWLEDGE_PIPELINE_HANDOFF_REQUIRE_EXEC_READY || 'false' }}
      KNOWLEDGE_PIPELINE_HANDOFF_REQUIRE_CANARY_FRESH: ${{ vars.KNOWLEDGE_PIPELINE_HANDOFF_REQUIRE_CANARY_FRESH || 'false' }}
      OPS_DAILY_REPORT_PATH: ${{ vars.OPS_DAILY_REPORT_PATH || 'sidecar-template/alpha-exec-engine/state/ops-daily-report.json' }}
      OPS_DAILY_NOTION_SYNC_PATH: ${{ vars.OPS_DAILY_NOTION_SYNC_PATH || 'sidecar-template/alpha-exec-engine/state/notion-ops-daily-sync.json' }}
      OPS_KNOWLEDGE_HANDOFF_PATH: ${{ vars.OPS_KNOWLEDGE_HANDOFF_PATH || 'state/ops-knowledge-handoff.json' }}
      OPS_KNOWLEDGE_HANDOFF_MD_PATH: ${{ vars.OPS_KNOWLEDGE_HANDOFF_MD_PATH || 'state/ops-knowledge-handoff.md' }}
      OBSIDIAN_BASE_URL: ${{ vars.OBSIDIAN_BASE_URL || 'http://127.0.0.1:27123' }}
      OBSIDIAN_API_KEY: ${{ secrets.OBSIDIAN_API_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID || vars.TELEGRAM_ALERT_CHAT_ID || secrets.TELEGRAM_SIMULATION_CHAT_ID || vars.TELEGRAM_SIMULATION_CHAT_ID || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Prepare state placeholders
        run: |
          mkdir -p state
          [ -f state/knowledge-intake-pipeline-report.json ] || echo '{}' > state/knowledge-intake-pipeline-report.json
          [ -f state/knowledge-approved-queue.json ] || echo '{"items":[]}' > state/knowledge-approved-queue.json
          [ -f state/knowledge-approved-queue.last-good.json ] || echo '{"items":[]}' > state/knowledge-approved-queue.last-good.json
          [ -f state/knowledge-approved-queue.md ] || printf '# Knowledge Approved Queue\n\n- (pending)\n' > state/knowledge-approved-queue.md
          [ -f state/knowledge-approved-queue-obsidian.md ] || printf '# Knowledge Approved Queue (Obsidian)\n\n- (pending)\n' > state/knowledge-approved-queue-obsidian.md
          [ -f state/notebooklm-intake.json ] || echo '{"generatedAt":"","items":[]}' > state/notebooklm-intake.json
          [ -f state/notebooklm-mcp-collect-report.json ] || echo '{}' > state/notebooklm-mcp-collect-report.json
          [ -f state/notebooklm-mcp-health.json ] || echo '{}' > state/notebooklm-mcp-health.json
          [ -f state/notebooklm-mcp-question-cursor.json ] || echo '{"cursor":0}' > state/notebooklm-mcp-question-cursor.json
          [ -f state/ops-knowledge-handoff.json ] || echo '{}' > state/ops-knowledge-handoff.json
          [ -f state/ops-knowledge-handoff.md ] || printf '## Ops -> Knowledge Handoff Contract\n\n- (pending)\n' > state/ops-knowledge-handoff.md

      - name: Validate strict profile
        run: |
          set -euo pipefail
          if [ "${KNOWLEDGE_PIPELINE_ENFORCE_STRICT}" != "true" ]; then
            echo "[STRICT] disabled (KNOWLEDGE_PIPELINE_ENFORCE_STRICT=${KNOWLEDGE_PIPELINE_ENFORCE_STRICT})"
            exit 0
          fi
          bad=0
          check_eq () {
            key="$1"
            want="$2"
            current="${!key:-}"
            if [ "$current" != "$want" ]; then
              echo "::error::$key must be '$want' (current='$current')"
              bad=1
            else
              echo "[STRICT][OK] $key=$current"
            fi
          }
          check_eq KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_ENABLED true
          check_eq KNOWLEDGE_PIPELINE_NOTEBOOKLM_REQUIRED true
          check_eq KNOWLEDGE_PIPELINE_NOTEBOOKLM_MCP_REQUIRED true
          check_eq KNOWLEDGE_PIPELINE_NOTEBOOKLM_AUTH_HARD_FAIL true
          check_eq KNOWLEDGE_PIPELINE_NOTEBOOKLM_AUTH_AUTO_SETUP true
          check_eq KNOWLEDGE_PIPELINE_QUEUE_KEEP_LAST_GOOD_ON_EMPTY false
          if [ "${KNOWLEDGE_PIPELINE_REQUIRE_SELF_HOSTED}" = "true" ]; then
            if [ "${RUNNER_ENVIRONMENT:-}" != "self-hosted" ]; then
              echo "::error::KNOWLEDGE_PIPELINE_REQUIRE_SELF_HOSTED=true but RUNNER_ENVIRONMENT=${RUNNER_ENVIRONMENT:-unknown}"
              bad=1
            else
              echo "[STRICT][OK] RUNNER_ENVIRONMENT=self-hosted"
            fi
          fi
          if [ "$bad" -ne 0 ]; then
            echo "::error::Strict profile check failed. Update repository variables or disable strict mode intentionally."
            exit 1
          fi

      - name: Build ops->knowledge handoff contract
        run: npm run ops:knowledge:handoff:build

      - name: Validate ops->knowledge handoff contract
        run: npm run ops:knowledge:handoff:validate

      - name: Collect from NotebookLM MCP (optional)
        timeout-minutes: ${{ fromJSON(vars.KNOWLEDGE_PIPELINE_NOTEBOOKLM_STEP_TIMEOUT_MIN || '30') }}
        run: npm run ops:knowledge:notebooklm

      - name: Build NotebookLM intake seed (optional)
        run: npm run ops:knowledge:bridge

      - name: Run knowledge intake pipeline
        run: npm run ops:knowledge:pipeline

      - name: Check knowledge markdown quality
        run: npm run ops:knowledge:quality

      - name: Notify Telegram on NotebookLM strict failures
        if: always()
        run: npm run ops:knowledge:alert

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: knowledge-intake-pipeline
          path: |
            state/knowledge-intake-pipeline-report.json
            state/knowledge-approved-queue.json
            state/knowledge-approved-queue.last-good.json
            state/knowledge-approved-queue.md
            state/knowledge-approved-queue-obsidian.md
            state/notebooklm-intake.json
            state/notebooklm-mcp-collect-report.json
            state/notebooklm-mcp-health.json
            state/notebooklm-mcp-question-cursor.json
            state/ops-knowledge-handoff.json
            state/ops-knowledge-handoff.md
            state/knowledge-markdown-quality-report.json
            state/knowledge-markdown-quality-report.md
          if-no-files-found: warn
