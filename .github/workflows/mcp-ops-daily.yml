name: MCP Ops Daily

on:
  schedule:
    # Daily at 00:15 UTC (09:15 KST)
    - cron: "15 0 * * *"
  workflow_dispatch:

concurrency:
  group: mcp-ops-daily-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mcp-ops-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # MCP package defaults
      MCP_GITHUB_COMMAND_PACKAGE: mcp-remote
      MCP_GITHUB_URL: https://api.githubcopilot.com/mcp/
      MCP_VERCEL_COMMAND_PACKAGE: mcp-remote
      MCP_VERCEL_URL: https://mcp.vercel.com
      MCP_TELEGRAM_COMMAND_PACKAGE: "@iqai/mcp-telegram"
      MCP_SENTRY_COMMAND_PACKAGE: "@sentry/mcp-server"

      # Tokens / secrets
      GITHUB_TOKEN: ${{ vars.GITHUB_TOKEN || secrets.MCP_GITHUB_TOKEN || secrets.GH_PAT || secrets.SIDECAR_DISPATCH_TOKEN || github.token }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_SIMULATION_CHAT_ID: ${{ secrets.TELEGRAM_SIMULATION_CHAT_ID || vars.TELEGRAM_SIMULATION_CHAT_ID }}
      SENTRY_ACCESS_TOKEN: ${{ secrets.SENTRY_ACCESS_TOKEN }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DB_DAILY_SNAPSHOT: ${{ vars.NOTION_DB_DAILY_SNAPSHOT }}
      NOTION_AUDIT_PAGE_SIZE: ${{ vars.NOTION_AUDIT_PAGE_SIZE || '40' }}
      NOTION_AUDIT_STALE_MINUTES: ${{ vars.NOTION_AUDIT_STALE_MINUTES || '240' }}
      NOTION_AUDIT_RUNKEY_PREFIXES: ${{ vars.NOTION_AUDIT_RUNKEY_PREFIXES || 'sidecar-' }}
      OPS_REPORT_LOOKBACK_HOURS: ${{ vars.OPS_REPORT_LOOKBACK_HOURS || '24' }}
      OPS_REPORT_MAX_RUNS: ${{ vars.OPS_REPORT_MAX_RUNS || '30' }}
      OPS_REPORT_CANARY_REPO: ${{ vars.OPS_REPORT_CANARY_REPO || 'pungking/US_Alpha_Seeker' }}
      OPS_REPORT_DRYRUN_REPO: ${{ vars.OPS_REPORT_DRYRUN_REPO || 'pungking/alpha-exec-engine' }}
      OPS_REPORT_CANARY_WORKFLOW: ${{ vars.OPS_REPORT_CANARY_WORKFLOW || 'sidecar-preflight-canary-recheck.yml' }}
      OPS_REPORT_DRYRUN_WORKFLOW: ${{ vars.OPS_REPORT_DRYRUN_WORKFLOW || 'dry-run.yml' }}

      # Base MCP placeholders (google-drive in mcp.base.json)
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run MCP ops daily routine
        run: npm run mcp:ops:daily

      - name: Run Notion ops audit
        run: npm run ops:notion:audit --prefix sidecar-template/alpha-exec-engine

      - name: Build ops daily report
        run: npm run ops:daily:report --prefix sidecar-template/alpha-exec-engine

      - name: Publish Notion ops audit summary
        if: always()
        run: |
          if [ -f "sidecar-template/alpha-exec-engine/state/notion-ops-audit.md" ]; then
            cat "sidecar-template/alpha-exec-engine/state/notion-ops-audit.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Notion Ops Audit" >> "$GITHUB_STEP_SUMMARY"
            echo "- result: no audit artifact generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish ops daily summary
        if: always()
        run: |
          if [ -f "sidecar-template/alpha-exec-engine/state/ops-daily-report.md" ]; then
            cat "sidecar-template/alpha-exec-engine/state/ops-daily-report.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Ops Daily Report (Auto)" >> "$GITHUB_STEP_SUMMARY"
            echo "- result: no daily ops report artifact generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload MCP smoke report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mcp-smoke-report
          path: state/mcp-smoke-report.json
          if-no-files-found: ignore

      - name: Upload Notion ops audit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: notion-ops-audit
          path: |
            sidecar-template/alpha-exec-engine/state/notion-ops-audit.json
            sidecar-template/alpha-exec-engine/state/notion-ops-audit.md
          if-no-files-found: ignore

      - name: Upload ops daily report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ops-daily-report
          path: |
            sidecar-template/alpha-exec-engine/state/ops-daily-report.json
            sidecar-template/alpha-exec-engine/state/ops-daily-report.md
          if-no-files-found: ignore
