name: Sidecar Preflight Canary Recheck

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target sidecar repository (owner/repo)"
        required: false
        default: "pungking/alpha-exec-engine"
        type: string
      target_ref:
        description: "Target sidecar branch/ref"
        required: false
        default: "main"
        type: string
      target_workflow:
        description: "Target workflow file"
        required: false
        default: "dry-run.yml"
        type: string
      max_wait_minutes:
        description: "Max wait for target run completion"
        required: false
        default: "25"
        type: choice
        options: ["10", "15", "20", "25", "30", "40"]
      run_allow_entry_outside_rth:
        description: "Pass ALLOW_ENTRY_OUTSIDE_RTH=true to target dry-run for canary reliability"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      run_actionable_include_speculative_buy:
        description: "Toggle actionable verdict set to avoid same hash/mode dedupe in repeated canary runs"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      run_entry_price_mode:
        description: "Pass ENTRY_PRICE_MODE override to target dry-run"
        required: false
        default: "adaptive"
        type: choice
        options: ["strict", "adaptive"]
      run_entry_price_max_chase_pct:
        description: "Pass ENTRY_PRICE_MAX_CHASE_PCT override to target dry-run"
        required: false
        default: "1.8"
        type: string
      run_entry_price_distance_trigger_pct:
        description: "Pass ENTRY_PRICE_DISTANCE_TRIGGER_PCT override to target dry-run"
        required: false
        default: "2.5"
        type: string
      run_entry_price_distance_scale:
        description: "Pass ENTRY_PRICE_DISTANCE_SCALE override to target dry-run"
        required: false
        default: "0.35"
        type: string
      run_entry_price_min_rr:
        description: "Pass ENTRY_PRICE_MIN_RR override to target dry-run"
        required: false
        default: "1.8"
        type: string
      run_dry_notional_per_trade_override:
        description: "Pass DRY_NOTIONAL_PER_TRADE override to target dry-run"
        required: false
        default: "100"
        type: string
      run_entry_high_price_policy:
        description: "Pass ENTRY_HIGH_PRICE_POLICY override to target dry-run"
        required: false
        default: "min_one_share"
        type: choice
        options: ["skip", "min_one_share"]
      run_entry_min_one_share_max_notional:
        description: "Pass ENTRY_MIN_ONE_SHARE_MAX_NOTIONAL override to target dry-run"
        required: false
        default: "300"
        type: string
      run_entry_max_risk_dollars_per_trade:
        description: "Pass ENTRY_MAX_RISK_DOLLARS_PER_TRADE override to target dry-run"
        required: false
        default: "25"
        type: string
      verify_mode:
        description: "Canary pass mode: auto(any), submit_pass, guard_skip_pass"
        required: false
        default: "auto"
        type: choice
        options: ["auto", "submit_pass", "guard_skip_pass"]
      verify_replace_tuning:
        description: "Verify ENTRY_OPEN_ORDER_REPLACE_* tuning markers against expected values"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      expected_replace_min_delta_bps:
        description: "Expected OPEN_ENTRY_RDEL value in sidecar startup summary"
        required: false
        default: "10"
        type: string
      expected_replace_max_chase_bps:
        description: "Expected OPEN_ENTRY_RMAX value in sidecar startup summary"
        required: false
        default: "120"
        type: string
      expected_replace_cooldown_minutes:
        description: "Expected OPEN_ENTRY_RCDN value in sidecar startup summary"
        required: false
        default: "10"
        type: string
      expected_replace_max_per_symbol_per_day:
        description: "Expected OPEN_ENTRY_RDAY value in sidecar startup summary"
        required: false
        default: "3"
        type: string
      verify_entry_price_tuning:
        description: "Verify ENTRY_PRICE_* startup markers against expected values"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      expected_entry_price_mode:
        description: "Expected ENTRY_PRICE_MODE value in sidecar startup summary"
        required: false
        default: "adaptive"
        type: choice
        options: ["strict", "adaptive"]
      expected_entry_price_max_chase_pct:
        description: "Expected ENTRY_PRICE_CHMAX value in sidecar startup summary"
        required: false
        default: "1.8"
        type: string
      expected_entry_price_distance_trigger_pct:
        description: "Expected ENTRY_PRICE_DISTT value in sidecar startup summary"
        required: false
        default: "2.5"
        type: string
      expected_entry_price_distance_scale:
        description: "Expected ENTRY_PRICE_DSCL value in sidecar startup summary"
        required: false
        default: "0.35"
        type: string
      expected_entry_price_min_rr:
        description: "Expected ENTRY_PRICE_MINRR value in sidecar startup summary"
        required: false
        default: "1.8"
        type: string

permissions:
  contents: read

concurrency:
  group: sidecar-preflight-canary-recheck-${{ github.ref }}
  cancel-in-progress: false

jobs:
  recheck:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SIDECAR_DISPATCH_TOKEN: ${{ vars.GITHUB_TOKEN || secrets.MCP_GITHUB_TOKEN || secrets.GH_PAT || secrets.SIDECAR_DISPATCH_TOKEN || github.token }}
      TARGET_REPO: ${{ inputs.target_repo || 'pungking/alpha-exec-engine' }}
      TARGET_REF: ${{ inputs.target_ref || 'main' }}
      TARGET_WORKFLOW: ${{ inputs.target_workflow || 'dry-run.yml' }}
      MAX_WAIT_MINUTES: ${{ inputs.max_wait_minutes || '25' }}
      RUN_ALLOW_ENTRY_OUTSIDE_RTH: ${{ inputs.run_allow_entry_outside_rth || 'true' }}
      RUN_ACTIONABLE_INCLUDE_SPECULATIVE_BUY: ${{ inputs.run_actionable_include_speculative_buy || 'true' }}
      RUN_ENTRY_PRICE_MODE: ${{ inputs.run_entry_price_mode || 'adaptive' }}
      RUN_ENTRY_PRICE_MAX_CHASE_PCT: ${{ inputs.run_entry_price_max_chase_pct || '1.8' }}
      RUN_ENTRY_PRICE_DISTANCE_TRIGGER_PCT: ${{ inputs.run_entry_price_distance_trigger_pct || '2.5' }}
      RUN_ENTRY_PRICE_DISTANCE_SCALE: ${{ inputs.run_entry_price_distance_scale || '0.35' }}
      RUN_ENTRY_PRICE_MIN_RR: ${{ inputs.run_entry_price_min_rr || '1.8' }}
      RUN_DRY_NOTIONAL_PER_TRADE_OVERRIDE: ${{ inputs.run_dry_notional_per_trade_override || '100' }}
      RUN_ENTRY_HIGH_PRICE_POLICY: ${{ inputs.run_entry_high_price_policy || 'min_one_share' }}
      RUN_ENTRY_MIN_ONE_SHARE_MAX_NOTIONAL: ${{ inputs.run_entry_min_one_share_max_notional || '300' }}
      RUN_ENTRY_MAX_RISK_DOLLARS_PER_TRADE: ${{ inputs.run_entry_max_risk_dollars_per_trade || '25' }}
      VERIFY_MODE: ${{ inputs.verify_mode || 'auto' }}
      VERIFY_REPLACE_TUNING: ${{ inputs.verify_replace_tuning || 'true' }}
      EXPECT_REPLACE_MIN_DELTA_BPS: ${{ inputs.expected_replace_min_delta_bps || '10' }}
      EXPECT_REPLACE_MAX_CHASE_BPS: ${{ inputs.expected_replace_max_chase_bps || '120' }}
      EXPECT_REPLACE_COOLDOWN_MINUTES: ${{ inputs.expected_replace_cooldown_minutes || '10' }}
      EXPECT_REPLACE_MAX_PER_SYMBOL_PER_DAY: ${{ inputs.expected_replace_max_per_symbol_per_day || '3' }}
      VERIFY_ENTRY_PRICE_TUNING: ${{ inputs.verify_entry_price_tuning || 'true' }}
      EXPECT_ENTRY_PRICE_MODE: ${{ inputs.expected_entry_price_mode || 'adaptive' }}
      EXPECT_ENTRY_PRICE_MAX_CHASE_PCT: ${{ inputs.expected_entry_price_max_chase_pct || '1.8' }}
      EXPECT_ENTRY_PRICE_DISTANCE_TRIGGER_PCT: ${{ inputs.expected_entry_price_distance_trigger_pct || '2.5' }}
      EXPECT_ENTRY_PRICE_DISTANCE_SCALE: ${{ inputs.expected_entry_price_distance_scale || '0.35' }}
      EXPECT_ENTRY_PRICE_MIN_RR: ${{ inputs.expected_entry_price_min_rr || '1.8' }}
    steps:
      - name: Validate dispatch token
        run: |
          if [ -z "${SIDECAR_DISPATCH_TOKEN:-}" ]; then
            echo "[ERROR] dispatch token is missing (GITHUB_TOKEN|MCP_GITHUB_TOKEN|GH_PAT|SIDECAR_DISPATCH_TOKEN)."
            exit 1
          fi

      - name: Dispatch canary run (normal preflight mode)
        id: dispatch
        uses: actions/github-script@v8
        env:
          TARGET_REPO: ${{ env.TARGET_REPO }}
          TARGET_REF: ${{ env.TARGET_REF }}
          TARGET_WORKFLOW: ${{ env.TARGET_WORKFLOW }}
          VERIFY_MODE: ${{ env.VERIFY_MODE }}
          RUN_ENTRY_PRICE_MODE: ${{ env.RUN_ENTRY_PRICE_MODE }}
          RUN_ENTRY_PRICE_MAX_CHASE_PCT: ${{ env.RUN_ENTRY_PRICE_MAX_CHASE_PCT }}
          RUN_ENTRY_PRICE_DISTANCE_TRIGGER_PCT: ${{ env.RUN_ENTRY_PRICE_DISTANCE_TRIGGER_PCT }}
          RUN_ENTRY_PRICE_DISTANCE_SCALE: ${{ env.RUN_ENTRY_PRICE_DISTANCE_SCALE }}
          RUN_ENTRY_PRICE_MIN_RR: ${{ env.RUN_ENTRY_PRICE_MIN_RR }}
          RUN_DRY_NOTIONAL_PER_TRADE_OVERRIDE: ${{ env.RUN_DRY_NOTIONAL_PER_TRADE_OVERRIDE }}
          RUN_ENTRY_HIGH_PRICE_POLICY: ${{ env.RUN_ENTRY_HIGH_PRICE_POLICY }}
          RUN_ENTRY_MIN_ONE_SHARE_MAX_NOTIONAL: ${{ env.RUN_ENTRY_MIN_ONE_SHARE_MAX_NOTIONAL }}
          RUN_ENTRY_MAX_RISK_DOLLARS_PER_TRADE: ${{ env.RUN_ENTRY_MAX_RISK_DOLLARS_PER_TRADE }}
        with:
          github-token: ${{ env.SIDECAR_DISPATCH_TOKEN }}
          script: |
            const targetRepoRaw = String(process.env.TARGET_REPO || '').trim();
            const repoMatch = targetRepoRaw.match(/^([^/]+)\/([^/]+)$/);
            if (!repoMatch) {
              core.setFailed(`invalid TARGET_REPO: ${targetRepoRaw}`);
              return;
            }
            const owner = repoMatch[1];
            const repo = repoMatch[2];
            const workflowId = String(process.env.TARGET_WORKFLOW || '').trim() || 'dry-run.yml';
            const ref = String(process.env.TARGET_REF || '').trim() || 'main';

            const beforeRuns = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              event: 'workflow_dispatch',
              per_page: 1
            });
            const baselineRunId = Number(beforeRuns.data?.workflow_runs?.[0]?.id || 0);
            const dedupeBustMaxOrders = "1";
            const dedupeBustMaxTotalNotional = String(
              500 + (Math.floor(Date.now() / 1000) % 60)
            );
            const verifyModeRaw = String(process.env.VERIFY_MODE || 'auto').trim().toLowerCase();
            const verifyModeAllowed = new Set(['auto', 'submit_pass', 'guard_skip_pass']);
            if (!verifyModeAllowed.has(verifyModeRaw)) {
              core.setFailed(`invalid VERIFY_MODE: ${verifyModeRaw}`);
              return;
            }
            const targetRunVerifyMode = verifyModeRaw === 'guard_skip_pass' ? 'guard_skip_pass' : 'submit_pass';

            const inputs = {
              run_force_send_once: 'true',
              run_allow_entry_outside_rth: String(process.env.RUN_ALLOW_ENTRY_OUTSIDE_RTH || 'true'),
              run_actionable_include_speculative_buy: String(
                process.env.RUN_ACTIONABLE_INCLUDE_SPECULATIVE_BUY || 'true'
              ),
              run_entry_price_mode: String(process.env.RUN_ENTRY_PRICE_MODE || 'adaptive'),
              run_entry_price_max_chase_pct: String(process.env.RUN_ENTRY_PRICE_MAX_CHASE_PCT || '1.8'),
              run_entry_price_distance_trigger_pct: String(
                process.env.RUN_ENTRY_PRICE_DISTANCE_TRIGGER_PCT || '2.5'
              ),
              run_entry_price_distance_scale: String(process.env.RUN_ENTRY_PRICE_DISTANCE_SCALE || '0.35'),
              run_entry_price_min_rr: String(process.env.RUN_ENTRY_PRICE_MIN_RR || '1.8'),
              run_dry_notional_per_trade_override: String(
                process.env.RUN_DRY_NOTIONAL_PER_TRADE_OVERRIDE || '100'
              ),
              run_entry_high_price_policy: String(process.env.RUN_ENTRY_HIGH_PRICE_POLICY || 'min_one_share'),
              run_entry_min_one_share_max_notional: String(
                process.env.RUN_ENTRY_MIN_ONE_SHARE_MAX_NOTIONAL || '300'
              ),
              run_entry_max_risk_dollars_per_trade: String(
                process.env.RUN_ENTRY_MAX_RISK_DOLLARS_PER_TRADE || '25'
              ),
              run_verify_mode: targetRunVerifyMode,
              run_disable_order_idempotency: 'true',
              run_dry_max_orders_override: dedupeBustMaxOrders,
              run_dry_max_total_notional_override: dedupeBustMaxTotalNotional,
              validation_pack: 'false',
              payload_probe: 'false'
            };

            let dispatchedVerifyMode = targetRunVerifyMode;
            let verifyModeFallback = false;
            let unsupportedInputs = [];
            let dispatched = false;
            for (let retry = 0; retry < 2; retry += 1) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner,
                  repo,
                  workflow_id: workflowId,
                  ref,
                  inputs
                });
                dispatched = true;
                break;
              } catch (error) {
                const message = String(error?.message || error || '');
                const matches = [...message.matchAll(/'([^']+)'/g)].map((m) => m[1]);
                const unexpected = message.includes('Unexpected inputs provided');
                if (!unexpected || retry > 0 || matches.length === 0) {
                  throw error;
                }
                unsupportedInputs = matches.filter((key) => Object.prototype.hasOwnProperty.call(inputs, key));
                if (unsupportedInputs.length === 0) {
                  throw error;
                }
                for (const key of unsupportedInputs) {
                  delete inputs[key];
                }
                if (unsupportedInputs.includes('run_verify_mode')) {
                  verifyModeFallback = true;
                  dispatchedVerifyMode = 'legacy_fallback';
                }
                core.warning(
                  `[PREFLIGHT_CANARY_WARN] target workflow does not accept input(s): ${unsupportedInputs.join(', ')}; retried without them.`
                );
              }
            }
            if (!dispatched) {
              core.setFailed('target workflow dispatch failed');
              return;
            }
            if (!Object.prototype.hasOwnProperty.call(inputs, 'run_verify_mode')) {
              verifyModeFallback = true;
              dispatchedVerifyMode = 'legacy_fallback';
              core.warning('[PREFLIGHT_CANARY_WARN] dispatched without run_verify_mode (legacy fallback).');
            }
            if (unsupportedInputs.length > 0) {
              core.notice(`[PREFLIGHT_CANARY] unsupported_inputs=${unsupportedInputs.join(',')}`);
            }

            const dispatchAt = new Date().toISOString();
            core.setOutput('dispatch_at', dispatchAt);
            core.setOutput('target_owner', owner);
            core.setOutput('target_repo', repo);
            core.setOutput('target_workflow', workflowId);
            core.setOutput('target_ref', ref);
            core.setOutput('baseline_run_id', String(baselineRunId));
            core.setOutput('dedupe_bust_max_orders', dedupeBustMaxOrders);
            core.setOutput('dedupe_bust_max_total_notional', dedupeBustMaxTotalNotional);

            const summaryLine =
              `[PREFLIGHT_CANARY] dispatched target=${owner}/${repo} workflow=${workflowId} ref=${ref} ` +
              `verifyModeExpected=${verifyModeRaw} verifyModeDispatch=${dispatchedVerifyMode} verifyModeFallback=${verifyModeFallback} ` +
              `allowEntryOutsideRth=${inputs.run_allow_entry_outside_rth} includeSpeculative=${inputs.run_actionable_include_speculative_buy} ` +
              `entryPriceMode=${inputs.run_entry_price_mode || "n/a"} entryPriceMaxChasePct=${inputs.run_entry_price_max_chase_pct || "n/a"} entryPriceDistanceTriggerPct=${inputs.run_entry_price_distance_trigger_pct || "n/a"} entryPriceDistanceScale=${inputs.run_entry_price_distance_scale || "n/a"} entryPriceMinRr=${inputs.run_entry_price_min_rr || "n/a"} ` +
              `notionalPerTradeOverride=${inputs.run_dry_notional_per_trade_override || "n/a"} highPricePolicy=${inputs.run_entry_high_price_policy || "n/a"} minOneShareMaxNotional=${inputs.run_entry_min_one_share_max_notional || "n/a"} maxRiskDollars=${inputs.run_entry_max_risk_dollars_per_trade || "n/a"} ` +
              `maxOrdersOverride=${inputs.run_dry_max_orders_override} maxTotalNotionalOverride=${inputs.run_dry_max_total_notional_override} ` +
              `baselineRunId=${baselineRunId} at=${dispatchAt}`;
            core.notice(summaryLine);
            await core.summary
              .addHeading('Preflight Canary Dispatch')
              .addRaw('```text\n')
              .addRaw(`${summaryLine}\n`)
              .addRaw('```\n')
              .write();

      - name: Wait target run and verify preflight/broker submit
        env:
          GH_TOKEN: ${{ env.SIDECAR_DISPATCH_TOKEN }}
          TARGET_REPO: ${{ env.TARGET_REPO }}
          TARGET_WORKFLOW: ${{ steps.dispatch.outputs.target_workflow || env.TARGET_WORKFLOW }}
          DISPATCH_AT: ${{ steps.dispatch.outputs.dispatch_at }}
          BASELINE_RUN_ID: ${{ steps.dispatch.outputs.baseline_run_id }}
          MAX_WAIT_MINUTES: ${{ env.MAX_WAIT_MINUTES }}
          VERIFY_MODE: ${{ env.VERIFY_MODE }}
          VERIFY_REPLACE_TUNING: ${{ env.VERIFY_REPLACE_TUNING }}
          EXPECT_REPLACE_MIN_DELTA_BPS: ${{ env.EXPECT_REPLACE_MIN_DELTA_BPS }}
          EXPECT_REPLACE_MAX_CHASE_BPS: ${{ env.EXPECT_REPLACE_MAX_CHASE_BPS }}
          EXPECT_REPLACE_COOLDOWN_MINUTES: ${{ env.EXPECT_REPLACE_COOLDOWN_MINUTES }}
          EXPECT_REPLACE_MAX_PER_SYMBOL_PER_DAY: ${{ env.EXPECT_REPLACE_MAX_PER_SYMBOL_PER_DAY }}
          VERIFY_ENTRY_PRICE_TUNING: ${{ env.VERIFY_ENTRY_PRICE_TUNING }}
          EXPECT_ENTRY_PRICE_MODE: ${{ env.EXPECT_ENTRY_PRICE_MODE }}
          EXPECT_ENTRY_PRICE_MAX_CHASE_PCT: ${{ env.EXPECT_ENTRY_PRICE_MAX_CHASE_PCT }}
          EXPECT_ENTRY_PRICE_DISTANCE_TRIGGER_PCT: ${{ env.EXPECT_ENTRY_PRICE_DISTANCE_TRIGGER_PCT }}
          EXPECT_ENTRY_PRICE_DISTANCE_SCALE: ${{ env.EXPECT_ENTRY_PRICE_DISTANCE_SCALE }}
          EXPECT_ENTRY_PRICE_MIN_RR: ${{ env.EXPECT_ENTRY_PRICE_MIN_RR }}
        run: |
          set -euo pipefail

          if [ -z "${DISPATCH_AT:-}" ]; then
            echo "[ERROR] DISPATCH_AT is empty"
            exit 1
          fi
          baseline_run_id="${BASELINE_RUN_ID:-0}"
          if ! [[ "$baseline_run_id" =~ ^[0-9]+$ ]]; then
            baseline_run_id="0"
          fi

          max_wait_s=$(( MAX_WAIT_MINUTES * 60 ))
          sleep_s=15
          elapsed=0
          run_id=""
          run_url=""
          run_conclusion=""

          while [ "$elapsed" -le "$max_wait_s" ]; do
            payload="$(gh run list --repo "$TARGET_REPO" --workflow "$TARGET_WORKFLOW" --event workflow_dispatch --limit 30 --json databaseId,createdAt,status,conclusion,url)"
            picked="$(node -e 'const baseline=Number(process.argv[1] || "0"); const payload=process.argv[2] || "[]"; const rows=JSON.parse(payload); const eligible=rows.filter((r)=>Number(r.databaseId||0) > baseline).sort((a,b)=>Number(b.databaseId||0)-Number(a.databaseId||0)); process.stdout.write(eligible.length ? JSON.stringify(eligible[0]) : "{}");' "$baseline_run_id" "$payload")"

            status="$(node -e 'const r=JSON.parse(process.argv[1]); console.log(r.status || "")' "$picked")"
            if [ "$status" = "completed" ]; then
              run_id="$(node -e 'const r=JSON.parse(process.argv[1]); console.log(r.databaseId || "")' "$picked")"
              run_url="$(node -e 'const r=JSON.parse(process.argv[1]); console.log(r.url || "")' "$picked")"
              run_conclusion="$(node -e 'const r=JSON.parse(process.argv[1]); console.log(r.conclusion || "")' "$picked")"
              break
            fi

            sleep "$sleep_s"
            elapsed=$(( elapsed + sleep_s ))
          done

          if [ -z "$run_id" ]; then
            echo "[ERROR] target run not completed within ${MAX_WAIT_MINUTES} minutes"
            exit 1
          fi

          if [ "$run_conclusion" != "success" ]; then
            echo "[ERROR] target run completed but not success: conclusion=$run_conclusion url=$run_url"
            exit 1
          fi

          log_path="/tmp/sidecar-preflight-canary-${run_id}.log"
          gh run view "$run_id" --repo "$TARGET_REPO" --log > "$log_path"

          artifact_dir="/tmp/sidecar-preflight-canary-${run_id}-artifact"
          rm -rf "$artifact_dir"
          mkdir -p "$artifact_dir"
          gh run download "$run_id" --repo "$TARGET_REPO" --dir "$artifact_dir"
          # Prefer the run-level preview (depth<=2) and avoid payload-probe previews.
          preview_path="$(find "$artifact_dir" -maxdepth 2 -type f -name 'last-dry-exec-preview.json' | head -n 1)"
          if [ -z "${preview_path}" ]; then
            echo "[ERROR] last-dry-exec-preview.json not found in downloaded artifacts"
            find "$artifact_dir" -maxdepth 3 -type f | sed -n '1,120p'
            exit 1
          fi
          run_output_path="$(find "$artifact_dir" -maxdepth 2 -type f -name 'last-run-output.log' | head -n 1)"
          if [ -z "${run_output_path}" ]; then
            run_output_path="${log_path}"
          fi

          verify_json_path="/tmp/sidecar-preflight-canary-${run_id}-verify.json"
          cat > /tmp/verify-sidecar-preflight-canary.js <<'NODE'
          const fs = require("node:fs");

          const previewPath = process.argv[2];
          const runUrl = process.argv[3];
          const outputPath = process.argv[4];
          const verifyModeRaw = String(process.argv[5] || "auto").trim().toLowerCase();
          const runOutputPath = String(process.argv[6] || "");
          const verifyReplaceRaw = String(process.argv[7] || "true").trim().toLowerCase();
          const expectedReplaceMinRaw = String(process.argv[8] || "10").trim();
          const expectedReplaceMaxRaw = String(process.argv[9] || "120").trim();
          const expectedReplaceCooldownRaw = String(process.argv[10] || "10").trim();
          const expectedReplacePerDayRaw = String(process.argv[11] || "3").trim();
          const verifyEntryPriceRaw = String(process.argv[12] || "true").trim().toLowerCase();
          const expectedEntryPriceModeRaw = String(process.argv[13] || "adaptive").trim().toLowerCase();
          const expectedEntryPriceMaxChaseRaw = String(process.argv[14] || "1.8").trim();
          const expectedEntryPriceDistanceTriggerRaw = String(process.argv[15] || "2.5").trim();
          const expectedEntryPriceDistanceScaleRaw = String(process.argv[16] || "0.35").trim();
          const expectedEntryPriceMinRrRaw = String(process.argv[17] || "1.8").trim();

          const verifyModeExpected =
            verifyModeRaw === "submit_pass" || verifyModeRaw === "guard_skip_pass" ? verifyModeRaw : "auto";
          const verifyReplaceTuning = verifyReplaceRaw === "true";

          const expectedReplaceMin = Number(expectedReplaceMinRaw);
          const expectedReplaceMax = Number(expectedReplaceMaxRaw);
          const expectedReplaceCooldown = Number(expectedReplaceCooldownRaw);
          const expectedReplacePerDay = Number(expectedReplacePerDayRaw);
          const verifyEntryPriceTuning = verifyEntryPriceRaw === "true";
          const expectedEntryPriceMode =
            expectedEntryPriceModeRaw === "adaptive" ? "adaptive" : "strict";
          const expectedEntryPriceMaxChase = Number(expectedEntryPriceMaxChaseRaw);
          const expectedEntryPriceDistanceTrigger = Number(expectedEntryPriceDistanceTriggerRaw);
          const expectedEntryPriceDistanceScale = Number(expectedEntryPriceDistanceScaleRaw);
          const expectedEntryPriceMinRr = Number(expectedEntryPriceMinRrRaw);

          const preview = JSON.parse(fs.readFileSync(previewPath, "utf8"));
          const preflight = typeof preview.preflight === "object" && preview.preflight ? preview.preflight : {};
          const preflightStatus = String(preflight.status || "").toLowerCase();
          const preflightCode = String(preflight.code || "");
          const preflightPass = preflightStatus === "pass" && preflightCode === "PREFLIGHT_PASS";

          const broker =
            typeof preview.brokerSubmission === "object" && preview.brokerSubmission ? preview.brokerSubmission : {};
          const attempted = Number.isFinite(Number(broker.attempted)) ? Number(broker.attempted) : 0;
          const submitted = Number.isFinite(Number(broker.submitted)) ? Number(broker.submitted) : 0;
          const brokerReason = String(broker.reason || "unknown");
          const orderRows = broker.orders && typeof broker.orders === "object" ? Object.values(broker.orders) : [];
          const guardReasonCount = orderRows.filter((row) => {
            const reason = String((row && row.reason) || "");
            return reason.startsWith("open_entry_order_exists") || reason.startsWith("open_entry_duplicate_exists");
          }).length;

          const submitPass = attempted >= 1 && submitted >= 1;
          const guardSkipPass =
            attempted === 0 && submitted === 0 && brokerReason === "submit_skipped_all" && guardReasonCount >= 1;
          const verifyModeObserved = submitPass ? "submit_pass" : guardSkipPass ? "guard_skip_pass" : "fail";
          const modePass =
            verifyModeExpected === "auto" ? submitPass || guardSkipPass : verifyModeObserved === verifyModeExpected;

          const logText = runOutputPath ? fs.readFileSync(runOutputPath, "utf8") : "";
          const rdelMatch = logText.match(/OPEN_ENTRY_RDEL\s*:\s*([0-9]+(?:\.[0-9]+)?)/);
          const rmaxMatch = logText.match(/OPEN_ENTRY_RMAX\s*:\s*([0-9]+(?:\.[0-9]+)?)/);
          const rcdnMatch = logText.match(/OPEN_ENTRY_RCDN\s*:\s*([0-9]+(?:\.[0-9]+)?)/);
          const rdayMatch = logText.match(/OPEN_ENTRY_RDAY\s*:\s*([0-9]+(?:\.[0-9]+)?)/);
          const entryModeMatch = logText.match(/ENTRY_PRICE_MODE\s*:\s*([A-Za-z_]+)/);
          const entryMaxChaseMatch = logText.match(/ENTRY_PRICE_CHMAX\s*:\s*([0-9]+(?:\.[0-9]+)?)/);
          const entryDistanceTriggerMatch = logText.match(/ENTRY_PRICE_DISTT\s*:\s*([0-9]+(?:\.[0-9]+)?)/);
          const entryDistanceScaleMatch = logText.match(/ENTRY_PRICE_DSCL\s*:\s*([0-9]+(?:\.[0-9]+)?)/);
          const entryMinRrMatch = logText.match(/ENTRY_PRICE_MINRR\s*:\s*([0-9]+(?:\.[0-9]+)?)/);

          const observedReplaceMin = rdelMatch ? Number(rdelMatch[1]) : null;
          const observedReplaceMax = rmaxMatch ? Number(rmaxMatch[1]) : null;
          const observedReplaceCooldown = rcdnMatch ? Number(rcdnMatch[1]) : null;
          const observedReplacePerDay = rdayMatch ? Number(rdayMatch[1]) : null;
          const observedEntryPriceMode = entryModeMatch ? String(entryModeMatch[1]).trim().toLowerCase() : null;
          const observedEntryPriceMaxChase = entryMaxChaseMatch ? Number(entryMaxChaseMatch[1]) : null;
          const observedEntryPriceDistanceTrigger = entryDistanceTriggerMatch
            ? Number(entryDistanceTriggerMatch[1])
            : null;
          const observedEntryPriceDistanceScale = entryDistanceScaleMatch
            ? Number(entryDistanceScaleMatch[1])
            : null;
          const observedEntryPriceMinRr = entryMinRrMatch ? Number(entryMinRrMatch[1]) : null;

          const expectedReplaceValid =
            Number.isFinite(expectedReplaceMin) &&
            expectedReplaceMin >= 0 &&
            Number.isFinite(expectedReplaceMax) &&
            expectedReplaceMax >= 0 &&
            Number.isFinite(expectedReplaceCooldown) &&
            expectedReplaceCooldown >= 0 &&
            Number.isFinite(expectedReplacePerDay) &&
            expectedReplacePerDay >= 1;
          const observedReplacePresent =
            observedReplaceMin != null &&
            observedReplaceMax != null &&
            observedReplaceCooldown != null &&
            observedReplacePerDay != null;
          const replaceTuningPass = !verifyReplaceTuning
            ? true
            : expectedReplaceValid &&
              observedReplacePresent &&
              observedReplaceMin === expectedReplaceMin &&
              observedReplaceMax === expectedReplaceMax &&
              observedReplaceCooldown === expectedReplaceCooldown &&
              observedReplacePerDay === expectedReplacePerDay;
          const expectedEntryPriceValid =
            ["strict", "adaptive"].includes(expectedEntryPriceMode) &&
            Number.isFinite(expectedEntryPriceMaxChase) &&
            expectedEntryPriceMaxChase >= 0 &&
            Number.isFinite(expectedEntryPriceDistanceTrigger) &&
            expectedEntryPriceDistanceTrigger >= 0 &&
            Number.isFinite(expectedEntryPriceDistanceScale) &&
            expectedEntryPriceDistanceScale >= 0 &&
            Number.isFinite(expectedEntryPriceMinRr) &&
            expectedEntryPriceMinRr > 0;
          const observedEntryPricePresent =
            observedEntryPriceMode != null &&
            observedEntryPriceMaxChase != null &&
            observedEntryPriceDistanceTrigger != null &&
            observedEntryPriceDistanceScale != null &&
            observedEntryPriceMinRr != null;
          const entryPriceTuningPass = !verifyEntryPriceTuning
            ? true
            : expectedEntryPriceValid &&
              observedEntryPricePresent &&
              observedEntryPriceMode === expectedEntryPriceMode &&
              observedEntryPriceMaxChase === expectedEntryPriceMaxChase &&
              observedEntryPriceDistanceTrigger === expectedEntryPriceDistanceTrigger &&
              observedEntryPriceDistanceScale === expectedEntryPriceDistanceScale &&
              observedEntryPriceMinRr === expectedEntryPriceMinRr;

          const pass = preflightPass && modePass && replaceTuningPass && entryPriceTuningPass;
          const out = {
            preflightPass,
            preflightCode: preflightCode || "N/A",
            attempted,
            submitted,
            brokerReason,
            guardReasonCount,
            verifyModeExpected,
            verifyModeObserved,
            modePass,
            verifyReplaceTuning,
            expectedReplaceMin,
            expectedReplaceMax,
            expectedReplaceCooldown,
            expectedReplacePerDay,
            observedReplaceMin,
            observedReplaceMax,
            observedReplaceCooldown,
            observedReplacePerDay,
            replaceTuningPass,
            verifyEntryPriceTuning,
            expectedEntryPriceMode,
            expectedEntryPriceMaxChase,
            expectedEntryPriceDistanceTrigger,
            expectedEntryPriceDistanceScale,
            expectedEntryPriceMinRr,
            observedEntryPriceMode,
            observedEntryPriceMaxChase,
            observedEntryPriceDistanceTrigger,
            observedEntryPriceDistanceScale,
            observedEntryPriceMinRr,
            entryPriceTuningPass,
            pass,
            previewPath,
            runOutputPath,
            runUrl
          };
          fs.writeFileSync(outputPath, JSON.stringify(out));
          const line =
            `[PREFLIGHT_CANARY_VERIFY] preflight_pass=${out.preflightPass} preflight_code=${out.preflightCode} ` +
            `attempted=${out.attempted} submitted=${out.submitted} broker_reason=${out.brokerReason} ` +
            `guard_reason_count=${out.guardReasonCount} verify_mode_expected=${out.verifyModeExpected} ` +
            `verify_mode_observed=${out.verifyModeObserved} mode_pass=${out.modePass} ` +
            `verify_replace_tuning=${out.verifyReplaceTuning} ` +
            `replace_expected=${out.expectedReplaceMin}/${out.expectedReplaceMax}/${out.expectedReplaceCooldown}/${out.expectedReplacePerDay} ` +
            `replace_observed=${out.observedReplaceMin ?? "n/a"}/${out.observedReplaceMax ?? "n/a"}/${out.observedReplaceCooldown ?? "n/a"}/${out.observedReplacePerDay ?? "n/a"} ` +
            `replace_tuning_pass=${out.replaceTuningPass} verify_entry_price_tuning=${out.verifyEntryPriceTuning} ` +
            `entry_price_expected=${out.expectedEntryPriceMode}/${out.expectedEntryPriceMaxChase}/${out.expectedEntryPriceDistanceTrigger}/${out.expectedEntryPriceDistanceScale}/${out.expectedEntryPriceMinRr} ` +
            `entry_price_observed=${out.observedEntryPriceMode ?? "n/a"}/${out.observedEntryPriceMaxChase ?? "n/a"}/${out.observedEntryPriceDistanceTrigger ?? "n/a"}/${out.observedEntryPriceDistanceScale ?? "n/a"}/${out.observedEntryPriceMinRr ?? "n/a"} ` +
            `entry_price_tuning_pass=${out.entryPriceTuningPass} pass=${out.pass} run_output=${out.runOutputPath} ` +
            `preview=${out.previewPath} url=${out.runUrl}`;
          console.log(line);
          if (!out.pass) process.exit(1);
          NODE
          node /tmp/verify-sidecar-preflight-canary.js \
            "$preview_path" \
            "$run_url" \
            "$verify_json_path" \
            "${VERIFY_MODE}" \
            "$run_output_path" \
            "${VERIFY_REPLACE_TUNING}" \
            "${EXPECT_REPLACE_MIN_DELTA_BPS}" \
            "${EXPECT_REPLACE_MAX_CHASE_BPS}" \
            "${EXPECT_REPLACE_COOLDOWN_MINUTES}" \
            "${EXPECT_REPLACE_MAX_PER_SYMBOL_PER_DAY}" \
            "${VERIFY_ENTRY_PRICE_TUNING}" \
            "${EXPECT_ENTRY_PRICE_MODE}" \
            "${EXPECT_ENTRY_PRICE_MAX_CHASE_PCT}" \
            "${EXPECT_ENTRY_PRICE_DISTANCE_TRIGGER_PCT}" \
            "${EXPECT_ENTRY_PRICE_DISTANCE_SCALE}" \
            "${EXPECT_ENTRY_PRICE_MIN_RR}"
          verify_line="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); const line=`[PREFLIGHT_CANARY_VERIFY] preflight_pass=${x.preflightPass} preflight_code=${x.preflightCode} attempted=${x.attempted} submitted=${x.submitted} broker_reason=${x.brokerReason} guard_reason_count=${x.guardReasonCount} verify_mode_expected=${x.verifyModeExpected} verify_mode_observed=${x.verifyModeObserved} mode_pass=${x.modePass} verify_replace_tuning=${x.verifyReplaceTuning} replace_expected=${x.expectedReplaceMin}/${x.expectedReplaceMax}/${x.expectedReplaceCooldown}/${x.expectedReplacePerDay} replace_observed=${x.observedReplaceMin ?? "n/a"}/${x.observedReplaceMax ?? "n/a"}/${x.observedReplaceCooldown ?? "n/a"}/${x.observedReplacePerDay ?? "n/a"} replace_tuning_pass=${x.replaceTuningPass} verify_entry_price_tuning=${x.verifyEntryPriceTuning} entry_price_expected=${x.expectedEntryPriceMode}/${x.expectedEntryPriceMaxChase}/${x.expectedEntryPriceDistanceTrigger}/${x.expectedEntryPriceDistanceScale}/${x.expectedEntryPriceMinRr} entry_price_observed=${x.observedEntryPriceMode ?? "n/a"}/${x.observedEntryPriceMaxChase ?? "n/a"}/${x.observedEntryPriceDistanceTrigger ?? "n/a"}/${x.observedEntryPriceDistanceScale ?? "n/a"}/${x.observedEntryPriceMinRr ?? "n/a"} entry_price_tuning_pass=${x.entryPriceTuningPass} pass=${x.pass} preview=${x.previewPath} url=${x.runUrl}`; process.stdout.write(line);' "$verify_json_path")"
          echo "$verify_line"

          verify_mode_expected="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.verifyModeExpected));' "$verify_json_path")"
          verify_mode_observed="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.verifyModeObserved));' "$verify_json_path")"
          mode_pass="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.modePass));' "$verify_json_path")"
          preflight_pass="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.preflightPass));' "$verify_json_path")"
          preflight_code="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.preflightCode));' "$verify_json_path")"
          attempted="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.attempted));' "$verify_json_path")"
          submitted="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.submitted));' "$verify_json_path")"
          broker_reason="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.brokerReason));' "$verify_json_path")"
          guard_reason_count="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.guardReasonCount));' "$verify_json_path")"
          verify_replace_tuning="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.verifyReplaceTuning));' "$verify_json_path")"
          expected_replace_min="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedReplaceMin));' "$verify_json_path")"
          expected_replace_max="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedReplaceMax));' "$verify_json_path")"
          expected_replace_cooldown="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedReplaceCooldown));' "$verify_json_path")"
          expected_replace_per_day="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedReplacePerDay));' "$verify_json_path")"
          observed_replace_min="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedReplaceMin));' "$verify_json_path")"
          observed_replace_max="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedReplaceMax));' "$verify_json_path")"
          observed_replace_cooldown="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedReplaceCooldown));' "$verify_json_path")"
          observed_replace_per_day="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedReplacePerDay));' "$verify_json_path")"
          replace_tuning_pass="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.replaceTuningPass));' "$verify_json_path")"
          verify_entry_price_tuning="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.verifyEntryPriceTuning));' "$verify_json_path")"
          expected_entry_price_mode="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedEntryPriceMode));' "$verify_json_path")"
          expected_entry_price_max_chase="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedEntryPriceMaxChase));' "$verify_json_path")"
          expected_entry_price_distance_trigger="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedEntryPriceDistanceTrigger));' "$verify_json_path")"
          expected_entry_price_distance_scale="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedEntryPriceDistanceScale));' "$verify_json_path")"
          expected_entry_price_min_rr="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedEntryPriceMinRr));' "$verify_json_path")"
          observed_entry_price_mode="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedEntryPriceMode));' "$verify_json_path")"
          observed_entry_price_max_chase="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedEntryPriceMaxChase));' "$verify_json_path")"
          observed_entry_price_distance_trigger="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedEntryPriceDistanceTrigger));' "$verify_json_path")"
          observed_entry_price_distance_scale="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedEntryPriceDistanceScale));' "$verify_json_path")"
          observed_entry_price_min_rr="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedEntryPriceMinRr));' "$verify_json_path")"
          entry_price_tuning_pass="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.entryPriceTuningPass));' "$verify_json_path")"

          {
            echo "## Sidecar Preflight Canary Recheck"
            echo ""
            echo "- target_run: ${run_url}"
            echo "- verify: \`${verify_line}\`"
            echo "- result: PASS (preflight=PASS and mode expectation satisfied)"
            echo ""
            echo "| metric | value |"
            echo "| --- | --- |"
            echo "| preflight_pass | \`${preflight_pass}\` |"
            echo "| preflight_code | \`${preflight_code}\` |"
            echo "| attempted | \`${attempted}\` |"
            echo "| submitted | \`${submitted}\` |"
            echo "| broker_reason | \`${broker_reason}\` |"
            echo "| guard_reason_count | \`${guard_reason_count}\` |"
            echo "| verify_mode_expected | \`${verify_mode_expected}\` |"
            echo "| verify_mode_observed | \`${verify_mode_observed}\` |"
            echo "| mode_pass | \`${mode_pass}\` |"
            echo "| verify_replace_tuning | \`${verify_replace_tuning}\` |"
            echo "| expected_replace(min/max/cooldown/day) | \`${expected_replace_min}/${expected_replace_max}/${expected_replace_cooldown}/${expected_replace_per_day}\` |"
            echo "| observed_replace(min/max/cooldown/day) | \`${observed_replace_min}/${observed_replace_max}/${observed_replace_cooldown}/${observed_replace_per_day}\` |"
            echo "| replace_tuning_pass | \`${replace_tuning_pass}\` |"
            echo "| verify_entry_price_tuning | \`${verify_entry_price_tuning}\` |"
            echo "| expected_entry_price(mode/maxChase/trigger/scale/minRr) | \`${expected_entry_price_mode}/${expected_entry_price_max_chase}/${expected_entry_price_distance_trigger}/${expected_entry_price_distance_scale}/${expected_entry_price_min_rr}\` |"
            echo "| observed_entry_price(mode/maxChase/trigger/scale/minRr) | \`${observed_entry_price_mode}/${observed_entry_price_max_chase}/${observed_entry_price_distance_trigger}/${observed_entry_price_distance_scale}/${observed_entry_price_min_rr}\` |"
            echo "| entry_price_tuning_pass | \`${entry_price_tuning_pass}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
