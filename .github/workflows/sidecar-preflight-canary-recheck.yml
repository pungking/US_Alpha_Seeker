name: Sidecar Preflight Canary Recheck

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target sidecar repository (owner/repo)"
        required: false
        default: "pungking/alpha-exec-engine"
        type: string
      target_ref:
        description: "Target sidecar branch/ref"
        required: false
        default: "main"
        type: string
      target_workflow:
        description: "Target workflow file"
        required: false
        default: "dry-run.yml"
        type: string
      max_wait_minutes:
        description: "Max wait for target run completion"
        required: false
        default: "25"
        type: choice
        options: ["10", "15", "20", "25", "30", "40"]
      run_allow_entry_outside_rth:
        description: "Pass ALLOW_ENTRY_OUTSIDE_RTH=true to target dry-run for canary reliability"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      run_actionable_include_speculative_buy:
        description: "Toggle actionable verdict set to avoid same hash/mode dedupe in repeated canary runs"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      verify_mode:
        description: "Canary pass mode: auto(any), submit_pass, guard_skip_pass"
        required: false
        default: "auto"
        type: choice
        options: ["auto", "submit_pass", "guard_skip_pass"]
      verify_replace_tuning:
        description: "Verify ENTRY_OPEN_ORDER_REPLACE_* tuning markers against expected values"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      expected_replace_min_delta_bps:
        description: "Expected OPEN_ENTRY_RDEL value in sidecar startup summary"
        required: false
        default: "10"
        type: string
      expected_replace_max_chase_bps:
        description: "Expected OPEN_ENTRY_RMAX value in sidecar startup summary"
        required: false
        default: "120"
        type: string
      expected_replace_cooldown_minutes:
        description: "Expected OPEN_ENTRY_RCDN value in sidecar startup summary"
        required: false
        default: "10"
        type: string
      expected_replace_max_per_symbol_per_day:
        description: "Expected OPEN_ENTRY_RDAY value in sidecar startup summary"
        required: false
        default: "3"
        type: string

permissions:
  contents: read

concurrency:
  group: sidecar-preflight-canary-recheck-${{ github.ref }}
  cancel-in-progress: false

jobs:
  recheck:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SIDECAR_DISPATCH_TOKEN: ${{ vars.GITHUB_TOKEN || secrets.MCP_GITHUB_TOKEN || secrets.GH_PAT || secrets.SIDECAR_DISPATCH_TOKEN || github.token }}
      TARGET_REPO: ${{ inputs.target_repo || 'pungking/alpha-exec-engine' }}
      TARGET_REF: ${{ inputs.target_ref || 'main' }}
      TARGET_WORKFLOW: ${{ inputs.target_workflow || 'dry-run.yml' }}
      MAX_WAIT_MINUTES: ${{ inputs.max_wait_minutes || '25' }}
      RUN_ALLOW_ENTRY_OUTSIDE_RTH: ${{ inputs.run_allow_entry_outside_rth || 'true' }}
      RUN_ACTIONABLE_INCLUDE_SPECULATIVE_BUY: ${{ inputs.run_actionable_include_speculative_buy || 'true' }}
      VERIFY_MODE: ${{ inputs.verify_mode || 'auto' }}
      VERIFY_REPLACE_TUNING: ${{ inputs.verify_replace_tuning || 'true' }}
      EXPECT_REPLACE_MIN_DELTA_BPS: ${{ inputs.expected_replace_min_delta_bps || '10' }}
      EXPECT_REPLACE_MAX_CHASE_BPS: ${{ inputs.expected_replace_max_chase_bps || '120' }}
      EXPECT_REPLACE_COOLDOWN_MINUTES: ${{ inputs.expected_replace_cooldown_minutes || '10' }}
      EXPECT_REPLACE_MAX_PER_SYMBOL_PER_DAY: ${{ inputs.expected_replace_max_per_symbol_per_day || '3' }}
    steps:
      - name: Validate dispatch token
        run: |
          if [ -z "${SIDECAR_DISPATCH_TOKEN:-}" ]; then
            echo "[ERROR] dispatch token is missing (GITHUB_TOKEN|MCP_GITHUB_TOKEN|GH_PAT|SIDECAR_DISPATCH_TOKEN)."
            exit 1
          fi

      - name: Dispatch canary run (normal preflight mode)
        id: dispatch
        uses: actions/github-script@v8
        env:
          TARGET_REPO: ${{ env.TARGET_REPO }}
          TARGET_REF: ${{ env.TARGET_REF }}
          TARGET_WORKFLOW: ${{ env.TARGET_WORKFLOW }}
          VERIFY_MODE: ${{ env.VERIFY_MODE }}
        with:
          github-token: ${{ env.SIDECAR_DISPATCH_TOKEN }}
          script: |
            const targetRepoRaw = String(process.env.TARGET_REPO || '').trim();
            const repoMatch = targetRepoRaw.match(/^([^/]+)\/([^/]+)$/);
            if (!repoMatch) {
              core.setFailed(`invalid TARGET_REPO: ${targetRepoRaw}`);
              return;
            }
            const owner = repoMatch[1];
            const repo = repoMatch[2];
            const workflowId = String(process.env.TARGET_WORKFLOW || '').trim() || 'dry-run.yml';
            const ref = String(process.env.TARGET_REF || '').trim() || 'main';

            const beforeRuns = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              event: 'workflow_dispatch',
              per_page: 1
            });
            const baselineRunId = Number(beforeRuns.data?.workflow_runs?.[0]?.id || 0);
            // Dedupe-bust knobs for repeated canary runs:
            // keep max total notional below default 2*100 so it actually changes
            // the runtime mode key (values above 200 were effectively no-op).
            const dedupeBustMaxOrders = "1";
            const dedupeBustMaxTotalNotional = String(
              130 + (Math.floor(Date.now() / 1000) % 60)
            );
            const verifyModeRaw = String(process.env.VERIFY_MODE || 'auto').trim().toLowerCase();
            const verifyModeAllowed = new Set(['auto', 'submit_pass', 'guard_skip_pass']);
            if (!verifyModeAllowed.has(verifyModeRaw)) {
              core.setFailed(`invalid VERIFY_MODE: ${verifyModeRaw}`);
              return;
            }
            const targetRunVerifyMode = verifyModeRaw === 'guard_skip_pass' ? 'guard_skip_pass' : 'submit_pass';

            const inputs = {
              run_force_send_once: 'true',
              run_allow_entry_outside_rth: String(process.env.RUN_ALLOW_ENTRY_OUTSIDE_RTH || 'true'),
              run_actionable_include_speculative_buy: String(
                process.env.RUN_ACTIONABLE_INCLUDE_SPECULATIVE_BUY || 'true'
              ),
              run_verify_mode: targetRunVerifyMode,
              run_disable_order_idempotency: 'true',
              run_dry_max_orders_override: dedupeBustMaxOrders,
              run_dry_max_total_notional_override: dedupeBustMaxTotalNotional,
              validation_pack: 'false',
              payload_probe: 'false'
            };

            let dispatchedVerifyMode = targetRunVerifyMode;
            let verifyModeFallback = false;
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: workflowId,
                ref,
                inputs
              });
            } catch (error) {
              const message = String(error?.message || error || '');
              const unsupportedVerifyMode =
                message.includes('Unexpected inputs provided') &&
                message.includes('run_verify_mode');
              if (!unsupportedVerifyMode) {
                throw error;
              }
              verifyModeFallback = true;
              delete inputs.run_verify_mode;
              dispatchedVerifyMode = 'legacy_fallback';
              core.warning(
                '[PREFLIGHT_CANARY_WARN] target workflow does not accept run_verify_mode yet; retried without this input.'
              );
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: workflowId,
                ref,
                inputs
              });
            }

            const dispatchAt = new Date().toISOString();
            core.setOutput('dispatch_at', dispatchAt);
            core.setOutput('target_owner', owner);
            core.setOutput('target_repo', repo);
            core.setOutput('target_workflow', workflowId);
            core.setOutput('target_ref', ref);
            core.setOutput('baseline_run_id', String(baselineRunId));
            core.setOutput('dedupe_bust_max_orders', dedupeBustMaxOrders);
            core.setOutput('dedupe_bust_max_total_notional', dedupeBustMaxTotalNotional);

            const summaryLine =
              `[PREFLIGHT_CANARY] dispatched target=${owner}/${repo} workflow=${workflowId} ref=${ref} ` +
              `verifyModeExpected=${verifyModeRaw} verifyModeDispatch=${dispatchedVerifyMode} verifyModeFallback=${verifyModeFallback} ` +
              `allowEntryOutsideRth=${inputs.run_allow_entry_outside_rth} includeSpeculative=${inputs.run_actionable_include_speculative_buy} ` +
              `maxOrdersOverride=${inputs.run_dry_max_orders_override} maxTotalNotionalOverride=${inputs.run_dry_max_total_notional_override} ` +
              `baselineRunId=${baselineRunId} at=${dispatchAt}`;
            core.notice(summaryLine);
            await core.summary
              .addHeading('Preflight Canary Dispatch')
              .addRaw('```text\n')
              .addRaw(`${summaryLine}\n`)
              .addRaw('```\n')
              .write();

      - name: Wait target run and verify preflight/broker submit
        env:
          GH_TOKEN: ${{ env.SIDECAR_DISPATCH_TOKEN }}
          TARGET_REPO: ${{ env.TARGET_REPO }}
          TARGET_WORKFLOW: ${{ steps.dispatch.outputs.target_workflow || env.TARGET_WORKFLOW }}
          DISPATCH_AT: ${{ steps.dispatch.outputs.dispatch_at }}
          BASELINE_RUN_ID: ${{ steps.dispatch.outputs.baseline_run_id }}
          MAX_WAIT_MINUTES: ${{ env.MAX_WAIT_MINUTES }}
          VERIFY_MODE: ${{ env.VERIFY_MODE }}
          VERIFY_REPLACE_TUNING: ${{ env.VERIFY_REPLACE_TUNING }}
          EXPECT_REPLACE_MIN_DELTA_BPS: ${{ env.EXPECT_REPLACE_MIN_DELTA_BPS }}
          EXPECT_REPLACE_MAX_CHASE_BPS: ${{ env.EXPECT_REPLACE_MAX_CHASE_BPS }}
          EXPECT_REPLACE_COOLDOWN_MINUTES: ${{ env.EXPECT_REPLACE_COOLDOWN_MINUTES }}
          EXPECT_REPLACE_MAX_PER_SYMBOL_PER_DAY: ${{ env.EXPECT_REPLACE_MAX_PER_SYMBOL_PER_DAY }}
        run: |
          set -euo pipefail

          if [ -z "${DISPATCH_AT:-}" ]; then
            echo "[ERROR] DISPATCH_AT is empty"
            exit 1
          fi
          baseline_run_id="${BASELINE_RUN_ID:-0}"
          if ! [[ "$baseline_run_id" =~ ^[0-9]+$ ]]; then
            baseline_run_id="0"
          fi

          max_wait_s=$(( MAX_WAIT_MINUTES * 60 ))
          sleep_s=15
          elapsed=0
          run_id=""
          run_url=""
          run_conclusion=""

          while [ "$elapsed" -le "$max_wait_s" ]; do
            payload="$(gh run list --repo "$TARGET_REPO" --workflow "$TARGET_WORKFLOW" --event workflow_dispatch --limit 30 --json databaseId,createdAt,status,conclusion,url)"
            picked="$(node -e 'const baseline=Number(process.argv[1] || "0"); const payload=process.argv[2] || "[]"; const rows=JSON.parse(payload); const eligible=rows.filter((r)=>Number(r.databaseId||0) > baseline).sort((a,b)=>Number(b.databaseId||0)-Number(a.databaseId||0)); process.stdout.write(eligible.length ? JSON.stringify(eligible[0]) : "{}");' "$baseline_run_id" "$payload")"

            status="$(node -e 'const r=JSON.parse(process.argv[1]); console.log(r.status || "")' "$picked")"
            if [ "$status" = "completed" ]; then
              run_id="$(node -e 'const r=JSON.parse(process.argv[1]); console.log(r.databaseId || "")' "$picked")"
              run_url="$(node -e 'const r=JSON.parse(process.argv[1]); console.log(r.url || "")' "$picked")"
              run_conclusion="$(node -e 'const r=JSON.parse(process.argv[1]); console.log(r.conclusion || "")' "$picked")"
              break
            fi

            sleep "$sleep_s"
            elapsed=$(( elapsed + sleep_s ))
          done

          if [ -z "$run_id" ]; then
            echo "[ERROR] target run not completed within ${MAX_WAIT_MINUTES} minutes"
            exit 1
          fi

          if [ "$run_conclusion" != "success" ]; then
            echo "[ERROR] target run completed but not success: conclusion=$run_conclusion url=$run_url"
            exit 1
          fi

          log_path="/tmp/sidecar-preflight-canary-${run_id}.log"
          gh run view "$run_id" --repo "$TARGET_REPO" --log > "$log_path"

          artifact_dir="/tmp/sidecar-preflight-canary-${run_id}-artifact"
          rm -rf "$artifact_dir"
          mkdir -p "$artifact_dir"
          gh run download "$run_id" --repo "$TARGET_REPO" --dir "$artifact_dir"
          # Prefer the run-level preview (depth<=2) and avoid payload-probe previews.
          preview_path="$(find "$artifact_dir" -maxdepth 2 -type f -name 'last-dry-exec-preview.json' | head -n 1)"
          if [ -z "${preview_path}" ]; then
            echo "[ERROR] last-dry-exec-preview.json not found in downloaded artifacts"
            find "$artifact_dir" -maxdepth 3 -type f | sed -n '1,120p'
            exit 1
          fi
          run_output_path="$(find "$artifact_dir" -maxdepth 2 -type f -name 'last-run-output.log' | head -n 1)"
          if [ -z "${run_output_path}" ]; then
            run_output_path="${log_path}"
          fi

          verify_json_path="/tmp/sidecar-preflight-canary-${run_id}-verify.json"
          cat > /tmp/verify-sidecar-preflight-canary.js <<'NODE'
          const fs = require("node:fs");

          const previewPath = process.argv[2];
          const runUrl = process.argv[3];
          const outputPath = process.argv[4];
          const verifyModeRaw = String(process.argv[5] || "auto").trim().toLowerCase();
          const runOutputPath = String(process.argv[6] || "");
          const verifyReplaceRaw = String(process.argv[7] || "true").trim().toLowerCase();
          const expectedReplaceMinRaw = String(process.argv[8] || "10").trim();
          const expectedReplaceMaxRaw = String(process.argv[9] || "120").trim();
          const expectedReplaceCooldownRaw = String(process.argv[10] || "10").trim();
          const expectedReplacePerDayRaw = String(process.argv[11] || "3").trim();

          const verifyModeExpected =
            verifyModeRaw === "submit_pass" || verifyModeRaw === "guard_skip_pass" ? verifyModeRaw : "auto";
          const verifyReplaceTuning = verifyReplaceRaw === "true";

          const expectedReplaceMin = Number(expectedReplaceMinRaw);
          const expectedReplaceMax = Number(expectedReplaceMaxRaw);
          const expectedReplaceCooldown = Number(expectedReplaceCooldownRaw);
          const expectedReplacePerDay = Number(expectedReplacePerDayRaw);

          const preview = JSON.parse(fs.readFileSync(previewPath, "utf8"));
          const preflight = typeof preview.preflight === "object" && preview.preflight ? preview.preflight : {};
          const preflightStatus = String(preflight.status || "").toLowerCase();
          const preflightCode = String(preflight.code || "");
          const preflightPass = preflightStatus === "pass" && preflightCode === "PREFLIGHT_PASS";

          const broker =
            typeof preview.brokerSubmission === "object" && preview.brokerSubmission ? preview.brokerSubmission : {};
          const attempted = Number.isFinite(Number(broker.attempted)) ? Number(broker.attempted) : 0;
          const submitted = Number.isFinite(Number(broker.submitted)) ? Number(broker.submitted) : 0;
          const brokerReason = String(broker.reason || "unknown");
          const orderRows = broker.orders && typeof broker.orders === "object" ? Object.values(broker.orders) : [];
          const guardReasonCount = orderRows.filter((row) => {
            const reason = String((row && row.reason) || "");
            return reason.startsWith("open_entry_order_exists") || reason.startsWith("open_entry_duplicate_exists");
          }).length;

          const submitPass = attempted >= 1 && submitted >= 1;
          const guardSkipPass =
            attempted === 0 && submitted === 0 && brokerReason === "submit_skipped_all" && guardReasonCount >= 1;
          const verifyModeObserved = submitPass ? "submit_pass" : guardSkipPass ? "guard_skip_pass" : "fail";
          const modePass =
            verifyModeExpected === "auto" ? submitPass || guardSkipPass : verifyModeObserved === verifyModeExpected;

          const logText = runOutputPath ? fs.readFileSync(runOutputPath, "utf8") : "";
          const rdelMatch = logText.match(/OPEN_ENTRY_RDEL\s*:\s*([0-9]+(?:\.[0-9]+)?)/);
          const rmaxMatch = logText.match(/OPEN_ENTRY_RMAX\s*:\s*([0-9]+(?:\.[0-9]+)?)/);
          const rcdnMatch = logText.match(/OPEN_ENTRY_RCDN\s*:\s*([0-9]+(?:\.[0-9]+)?)/);
          const rdayMatch = logText.match(/OPEN_ENTRY_RDAY\s*:\s*([0-9]+(?:\.[0-9]+)?)/);

          const observedReplaceMin = rdelMatch ? Number(rdelMatch[1]) : null;
          const observedReplaceMax = rmaxMatch ? Number(rmaxMatch[1]) : null;
          const observedReplaceCooldown = rcdnMatch ? Number(rcdnMatch[1]) : null;
          const observedReplacePerDay = rdayMatch ? Number(rdayMatch[1]) : null;

          const expectedReplaceValid =
            Number.isFinite(expectedReplaceMin) &&
            expectedReplaceMin >= 0 &&
            Number.isFinite(expectedReplaceMax) &&
            expectedReplaceMax >= 0 &&
            Number.isFinite(expectedReplaceCooldown) &&
            expectedReplaceCooldown >= 0 &&
            Number.isFinite(expectedReplacePerDay) &&
            expectedReplacePerDay >= 1;
          const observedReplacePresent =
            observedReplaceMin != null &&
            observedReplaceMax != null &&
            observedReplaceCooldown != null &&
            observedReplacePerDay != null;
          const replaceTuningPass = !verifyReplaceTuning
            ? true
            : expectedReplaceValid &&
              observedReplacePresent &&
              observedReplaceMin === expectedReplaceMin &&
              observedReplaceMax === expectedReplaceMax &&
              observedReplaceCooldown === expectedReplaceCooldown &&
              observedReplacePerDay === expectedReplacePerDay;

          const pass = preflightPass && modePass && replaceTuningPass;
          const out = {
            preflightPass,
            preflightCode: preflightCode || "N/A",
            attempted,
            submitted,
            brokerReason,
            guardReasonCount,
            verifyModeExpected,
            verifyModeObserved,
            modePass,
            verifyReplaceTuning,
            expectedReplaceMin,
            expectedReplaceMax,
            expectedReplaceCooldown,
            expectedReplacePerDay,
            observedReplaceMin,
            observedReplaceMax,
            observedReplaceCooldown,
            observedReplacePerDay,
            replaceTuningPass,
            pass,
            previewPath,
            runOutputPath,
            runUrl
          };
          fs.writeFileSync(outputPath, JSON.stringify(out));
          const line =
            `[PREFLIGHT_CANARY_VERIFY] preflight_pass=${out.preflightPass} preflight_code=${out.preflightCode} ` +
            `attempted=${out.attempted} submitted=${out.submitted} broker_reason=${out.brokerReason} ` +
            `guard_reason_count=${out.guardReasonCount} verify_mode_expected=${out.verifyModeExpected} ` +
            `verify_mode_observed=${out.verifyModeObserved} mode_pass=${out.modePass} ` +
            `verify_replace_tuning=${out.verifyReplaceTuning} ` +
            `replace_expected=${out.expectedReplaceMin}/${out.expectedReplaceMax}/${out.expectedReplaceCooldown}/${out.expectedReplacePerDay} ` +
            `replace_observed=${out.observedReplaceMin ?? "n/a"}/${out.observedReplaceMax ?? "n/a"}/${out.observedReplaceCooldown ?? "n/a"}/${out.observedReplacePerDay ?? "n/a"} ` +
            `replace_tuning_pass=${out.replaceTuningPass} pass=${out.pass} run_output=${out.runOutputPath} ` +
            `preview=${out.previewPath} url=${out.runUrl}`;
          console.log(line);
          if (!out.pass) process.exit(1);
          NODE
          node /tmp/verify-sidecar-preflight-canary.js \
            "$preview_path" \
            "$run_url" \
            "$verify_json_path" \
            "${VERIFY_MODE}" \
            "$run_output_path" \
            "${VERIFY_REPLACE_TUNING}" \
            "${EXPECT_REPLACE_MIN_DELTA_BPS}" \
            "${EXPECT_REPLACE_MAX_CHASE_BPS}" \
            "${EXPECT_REPLACE_COOLDOWN_MINUTES}" \
            "${EXPECT_REPLACE_MAX_PER_SYMBOL_PER_DAY}"
          verify_line="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); const line=`[PREFLIGHT_CANARY_VERIFY] preflight_pass=${x.preflightPass} preflight_code=${x.preflightCode} attempted=${x.attempted} submitted=${x.submitted} broker_reason=${x.brokerReason} guard_reason_count=${x.guardReasonCount} verify_mode_expected=${x.verifyModeExpected} verify_mode_observed=${x.verifyModeObserved} mode_pass=${x.modePass} verify_replace_tuning=${x.verifyReplaceTuning} replace_expected=${x.expectedReplaceMin}/${x.expectedReplaceMax}/${x.expectedReplaceCooldown}/${x.expectedReplacePerDay} replace_observed=${x.observedReplaceMin ?? "n/a"}/${x.observedReplaceMax ?? "n/a"}/${x.observedReplaceCooldown ?? "n/a"}/${x.observedReplacePerDay ?? "n/a"} replace_tuning_pass=${x.replaceTuningPass} pass=${x.pass} preview=${x.previewPath} url=${x.runUrl}`; process.stdout.write(line);' "$verify_json_path")"
          echo "$verify_line"

          verify_mode_expected="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.verifyModeExpected));' "$verify_json_path")"
          verify_mode_observed="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.verifyModeObserved));' "$verify_json_path")"
          mode_pass="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.modePass));' "$verify_json_path")"
          preflight_pass="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.preflightPass));' "$verify_json_path")"
          preflight_code="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.preflightCode));' "$verify_json_path")"
          attempted="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.attempted));' "$verify_json_path")"
          submitted="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.submitted));' "$verify_json_path")"
          broker_reason="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.brokerReason));' "$verify_json_path")"
          guard_reason_count="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.guardReasonCount));' "$verify_json_path")"
          verify_replace_tuning="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.verifyReplaceTuning));' "$verify_json_path")"
          expected_replace_min="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedReplaceMin));' "$verify_json_path")"
          expected_replace_max="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedReplaceMax));' "$verify_json_path")"
          expected_replace_cooldown="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedReplaceCooldown));' "$verify_json_path")"
          expected_replace_per_day="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.expectedReplacePerDay));' "$verify_json_path")"
          observed_replace_min="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedReplaceMin));' "$verify_json_path")"
          observed_replace_max="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedReplaceMax));' "$verify_json_path")"
          observed_replace_cooldown="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedReplaceCooldown));' "$verify_json_path")"
          observed_replace_per_day="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.observedReplacePerDay));' "$verify_json_path")"
          replace_tuning_pass="$(node -e 'const fs=require("node:fs"); const x=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(String(x.replaceTuningPass));' "$verify_json_path")"

          {
            echo "## Sidecar Preflight Canary Recheck"
            echo ""
            echo "- target_run: ${run_url}"
            echo "- verify: \`${verify_line}\`"
            echo "- result: PASS (preflight=PASS and mode expectation satisfied)"
            echo ""
            echo "| metric | value |"
            echo "| --- | --- |"
            echo "| preflight_pass | \`${preflight_pass}\` |"
            echo "| preflight_code | \`${preflight_code}\` |"
            echo "| attempted | \`${attempted}\` |"
            echo "| submitted | \`${submitted}\` |"
            echo "| broker_reason | \`${broker_reason}\` |"
