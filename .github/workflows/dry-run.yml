# BRIDGE WORKFLOW (US_Alpha_Seeker repo)
# - This workflow does not execute the sidecar engine locally.
# - It forwards manual runs to pungking/alpha-exec-engine dry-run.yml.
# - Use schedule.yml + sidecar-dispatch-watchdog.yml for automated dispatch/fallback.
name: sidecar-dry-run-bridge

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target sidecar repository (owner/repo)"
        required: false
        default: "pungking/alpha-exec-engine"
        type: string
      target_ref:
        description: "Target sidecar branch/ref"
        required: false
        default: "main"
        type: string
      target_workflow:
        description: "Target workflow file"
        required: false
        default: "dry-run.yml"
        type: string
      run_force_send_once:
        description: "Force send once for current stage6Hash+mode"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_verify_mode:
        description: "Manual safety/verification preset (safe_default|submit_pass|guard_skip_pass|auto)"
        required: false
        default: "safe_default"
        type: choice
        options: ["safe_default", "submit_pass", "guard_skip_pass", "auto"]
      run_allow_entry_outside_rth:
        description: "Allow entry outside RTH for this run"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_actionable_include_speculative_buy:
        description: "Include SPECULATIVE_BUY in actionable verdicts"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_position_lifecycle_enabled:
        description: "Enable position lifecycle action-intent scaffold"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_position_lifecycle_preview_only:
        description: "Keep lifecycle scaffold preview-only"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      run_position_lifecycle_action_preset:
        description: "Lifecycle action type preset"
        required: false
        default: "ENTRY_AND_HOLD"
        type: choice
        options: ["ENTRY_AND_HOLD", "ENTRY_ONLY", "ALL", "CUSTOM"]
      run_position_lifecycle_action_types_override:
        description: "Lifecycle action types override when preset=CUSTOM"
        required: false
        default: ""
        type: string
      run_lifecycle_selftest:
        description: "Run lifecycle guard self-test logs"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_disable_order_idempotency:
        description: "Disable idempotency gate for one validation run"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_dry_max_orders_override:
        description: "Override DRY_MAX_ORDERS for one run"
        required: false
        default: ""
        type: string
      run_dry_max_total_notional_override:
        description: "Override DRY_MAX_TOTAL_NOTIONAL for one run"
        required: false
        default: ""
        type: string
      validation_pack:
        description: "Run OFF/ON/STRICT entry feasibility checks"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      payload_probe:
        description: "Run one-shot payload path probe"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      payload_probe_mode:
        description: "Payload probe mode"
        required: false
        default: "tighten"
        type: choice
        options: ["tighten", "relief"]
      payload_probe_min_conviction:
        description: "Temporary DRY_RISK_OFF_MIN_CONVICTION for payload probe"
        required: false
        default: "30"
        type: choice
        options: ["20", "30", "40", "50"]

permissions:
  contents: read

concurrency:
  group: sidecar-dry-run-bridge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SIDECAR_DISPATCH_TOKEN: ${{ vars.GITHUB_TOKEN || secrets.MCP_GITHUB_TOKEN || secrets.GH_PAT || secrets.SIDECAR_DISPATCH_TOKEN || github.token }}
    steps:
      - name: Validate dispatch token
        run: |
          if [ -z "${SIDECAR_DISPATCH_TOKEN:-}" ]; then
            echo "[ERROR] dispatch token is missing (GITHUB_TOKEN|MCP_GITHUB_TOKEN|GH_PAT|SIDECAR_DISPATCH_TOKEN)."
            exit 1
          fi

      - name: Dispatch sidecar dry-run workflow
        uses: actions/github-script@v8
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_REF: ${{ inputs.target_ref }}
          TARGET_WORKFLOW: ${{ inputs.target_workflow }}
          RUN_FORCE_SEND_ONCE: ${{ inputs.run_force_send_once }}
          RUN_VERIFY_MODE: ${{ inputs.run_verify_mode }}
          RUN_ALLOW_ENTRY_OUTSIDE_RTH: ${{ inputs.run_allow_entry_outside_rth }}
          RUN_ACTIONABLE_INCLUDE_SPECULATIVE_BUY: ${{ inputs.run_actionable_include_speculative_buy }}
          RUN_POSITION_LIFECYCLE_ENABLED: ${{ inputs.run_position_lifecycle_enabled }}
          RUN_POSITION_LIFECYCLE_PREVIEW_ONLY: ${{ inputs.run_position_lifecycle_preview_only }}
          RUN_POSITION_LIFECYCLE_ACTION_PRESET: ${{ inputs.run_position_lifecycle_action_preset }}
          RUN_POSITION_LIFECYCLE_ACTION_TYPES_OVERRIDE: ${{ inputs.run_position_lifecycle_action_types_override }}
          RUN_LIFECYCLE_SELFTEST: ${{ inputs.run_lifecycle_selftest }}
          RUN_DISABLE_ORDER_IDEMPOTENCY: ${{ inputs.run_disable_order_idempotency }}
          RUN_DRY_MAX_ORDERS_OVERRIDE: ${{ inputs.run_dry_max_orders_override }}
          RUN_DRY_MAX_TOTAL_NOTIONAL_OVERRIDE: ${{ inputs.run_dry_max_total_notional_override }}
          VALIDATION_PACK: ${{ inputs.validation_pack }}
          PAYLOAD_PROBE: ${{ inputs.payload_probe }}
          PAYLOAD_PROBE_MODE: ${{ inputs.payload_probe_mode }}
          PAYLOAD_PROBE_MIN_CONVICTION: ${{ inputs.payload_probe_min_conviction }}
        with:
          github-token: ${{ env.SIDECAR_DISPATCH_TOKEN }}
          script: |
            const targetRepoRaw = String(process.env.TARGET_REPO || "").trim() || "pungking/alpha-exec-engine";
            const repoMatch = targetRepoRaw.match(/^([^/]+)\/([^/]+)$/);
            if (!repoMatch) {
              core.setFailed(`invalid target_repo: ${targetRepoRaw}`);
              return;
            }
            const owner = repoMatch[1];
            const repo = repoMatch[2];
            const workflowId = String(process.env.TARGET_WORKFLOW || "").trim() || "dry-run.yml";
            const ref = String(process.env.TARGET_REF || "").trim() || "main";

            const inputs = {
              run_force_send_once: String(process.env.RUN_FORCE_SEND_ONCE || "false"),
              run_allow_entry_outside_rth: String(process.env.RUN_ALLOW_ENTRY_OUTSIDE_RTH || "false"),
              run_actionable_include_speculative_buy: String(process.env.RUN_ACTIONABLE_INCLUDE_SPECULATIVE_BUY || "false"),
              run_position_lifecycle_enabled: String(process.env.RUN_POSITION_LIFECYCLE_ENABLED || "false"),
              run_position_lifecycle_preview_only: String(process.env.RUN_POSITION_LIFECYCLE_PREVIEW_ONLY || "true"),
              run_position_lifecycle_action_preset: String(process.env.RUN_POSITION_LIFECYCLE_ACTION_PRESET || "ENTRY_AND_HOLD"),
              run_position_lifecycle_action_types_override: String(process.env.RUN_POSITION_LIFECYCLE_ACTION_TYPES_OVERRIDE || ""),
              run_lifecycle_selftest: String(process.env.RUN_LIFECYCLE_SELFTEST || "false"),
              run_disable_order_idempotency: String(process.env.RUN_DISABLE_ORDER_IDEMPOTENCY || "false"),
              run_dry_max_orders_override: String(process.env.RUN_DRY_MAX_ORDERS_OVERRIDE || ""),
              run_dry_max_total_notional_override: String(process.env.RUN_DRY_MAX_TOTAL_NOTIONAL_OVERRIDE || ""),
              validation_pack: String(process.env.VALIDATION_PACK || "false"),
              payload_probe: String(process.env.PAYLOAD_PROBE || "false"),
              payload_probe_mode: String(process.env.PAYLOAD_PROBE_MODE || "tighten"),
              payload_probe_min_conviction: String(process.env.PAYLOAD_PROBE_MIN_CONVICTION || "30")
            };
            const runVerifyMode = String(process.env.RUN_VERIFY_MODE || "").trim().toLowerCase();
            const verifyModeAllowed = new Set(["safe_default", "submit_pass", "guard_skip_pass", "auto"]);
            if (runVerifyMode && !verifyModeAllowed.has(runVerifyMode)) {
              core.setFailed(
                `invalid run_verify_mode=${runVerifyMode} (allowed: safe_default|submit_pass|guard_skip_pass|auto)`
              );
              return;
            }
            if (runVerifyMode) {
              inputs.run_verify_mode = runVerifyMode;
            }

            let dispatchedVerifyMode = runVerifyMode || "none";
            let verifyModeFallback = false;
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: workflowId,
                ref,
                inputs
              });
            } catch (error) {
              const message = String(error?.message || error || "");
              const unsupportedVerifyMode =
                Boolean(runVerifyMode) &&
                message.includes("Unexpected inputs provided") &&
                message.includes("run_verify_mode");
              if (!unsupportedVerifyMode) {
                throw error;
              }
              if (runVerifyMode === "safe_default") {
                core.setFailed(
                  "[SIDECAR_BRIDGE_ERROR] target workflow does not accept run_verify_mode=safe_default. Sync target sidecar dry-run workflow before dispatching."
                );
                return;
              }
              verifyModeFallback = true;
              delete inputs.run_verify_mode;
              dispatchedVerifyMode = "legacy_fallback";
              core.warning(
                "[SIDECAR_BRIDGE_WARN] target workflow does not accept run_verify_mode yet; retried without this input."
              );
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: workflowId,
                ref,
                inputs
              });
            }

            const summaryLine =
              `[SIDECAR_BRIDGE_OK] target=${owner}/${repo} workflow=${workflowId} ref=${ref} ` +
              `verify_mode_request=${runVerifyMode || "none"} verify_mode_dispatch=${dispatchedVerifyMode} ` +
              `verify_mode_fallback=${verifyModeFallback} validation_pack=${inputs.validation_pack} payload_probe=${inputs.payload_probe}`;
            core.notice(summaryLine);
            await core.summary
              .addHeading("Sidecar Dry-Run Bridge")
              .addRaw("```text\n")
              .addRaw(`${summaryLine}\n`)
              .addRaw("```\n")
              .write();
