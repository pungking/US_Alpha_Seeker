name: analysis-safety-ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Analysis repo boundary guard
        run: npm run ops:safety:analysis-boundary
      - name: Telegram routing policy audit
        run: npm run ops:safety:telegram-routing
      - name: Client secret exposure audit
        run: npm run ops:safety:client-secret-exposure
      - name: Stage6 fillability contract fixture
        run: npm run ops:stage6:fillability-contract:validate
      - name: Stage6 fresh-focus formula coverage fixture
        run: npm run ops:stage6:fresh-focus:formula-coverage
      - name: Stage6 policy-lane formula consistency fixture
        run: npm run ops:stage6:policy-lane:formula-consistency
      - name: Stage6 formula tuning backlog fixture
        run: npm run ops:stage6:formula-tuning-backlog:validate
      - name: Stage6 runtime formula contract proof
        run: npm run ops:stage6:runtime-formula-contract:proof
      - name: Stage6 producer tuning 2 audit
        run: npm run ops:stage6:producer-tuning-2:audit
      - name: Stage6 formula audit/backlog alignment fixture
        run: npm run ops:stage6:formula-audit-backlog:align
      - name: Stage5 lineage contract fixture
        run: npm run ops:stage5:lineage-contract:validate
      - name: Stage3-6 full-stage audit
        run: npm run ops:stage3-6:full:audit
      - name: Stage6 weak pillar runtime audit
        run: npm run ops:stage6:weak-pillar:audit
      - name: Stage6 runtime formula goal status
        run: npm run ops:stage6:runtime-formula-goal:status
      - name: Stage3-6 audit group summary
        run: npm run ops:stage3-6:audit-group-summary
      - name: Stage6 holiday analysis-only fixture
        env:
          STAGE6_HOLIDAY_SAFETY_PAYLOAD: docs/fixtures/stage6_holiday_safety/stage6-dispatch-payload-holiday.fixture.json
          STAGE6_HOLIDAY_SAFETY_MARKET_DATE: "2026-06-19"
          STAGE6_HOLIDAY_SAFETY_EXPECT_ANALYSIS_ONLY: "true"
          STAGE6_HOLIDAY_SAFETY_WRITE_PAYLOAD: "false"
        run: npm run ops:stage6:holiday-safety
      - name: Stage6 quality trend audit
        run: npm run ops:stage6:quality-trend:audit
      - name: Stage6 earnings coverage audit
        env:
          STAGE6_EARNINGS_AUDIT_INPUT_DIR: docs/fixtures/stage6_earnings_coverage
        run: npm run ops:stage6:earnings:audit
      - name: Auto-scheduler reliability audit
        run: npm run ops:auto-scheduler:audit
      - name: TypeScript debt report (non-blocking)
        run: npm run ops:tsc:debt
        continue-on-error: true
      - name: Upload safety reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-safety-reports
          path: |
            state/analysis-repo-safety-boundary.*
            state/telegram-routing-policy-audit.*
            state/client-secret-exposure-audit.*
            state/stage6-holiday-safety-audit.*
            state/stage6-quality-trend-audit.*
            state/stage6-formula-tuning-backlog.*
            state/stage6-runtime-formula-contract-proof.*
            state/stage6-producer-tuning-2-audit.*
            state/stage6-runtime-formula-goal-status.*
            state/stage6-formula-audit-backlog-alignment.*
            state/stage6-weak-pillar-runtime-audit.*
            state/stage3-6-full-stage-audit.*
            state/stage3-6-audit-group-summary.*
            docs/STAGE3_6_FULL_STAGE_AUDIT.md
            docs/STAGE6_WEAK_PILLAR_RUNTIME_AUDIT.md
            state/stage6-earnings-coverage-audit.*
            state/auto-scheduler-reliability-audit.*
            state/tsc-debt-report.*
