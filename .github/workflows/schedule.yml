
name: US Alpha Seeker Auto-Scheduler

on:
  schedule:
    # Redundant pre-RTH fanout. GitHub scheduled events can be delayed or
    # dropped; the freshness-aware gate below prevents duplicate analysis
    # without letting an early manual force run suppress the RTH-ready hash.
    - cron: '17 9 * * 1-5'
    - cron: '17 10 * * 1-5'
    - cron: '17 11 * * 1-5'
    - cron: '17 12 * * 1-5'
    - cron: '17 13 * * 1-5'
    # RTH catch-up slots; freshness-aware gate prevents duplicate analysis.
    - cron: '37 13 * * 1-5'
    - cron: '57 13 * * 1-5'
    - cron: '17 14 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼 (테스트용)
    inputs:
      force:
        description: "Bypass the same-market-day duplicate guard"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  repository_dispatch:
    types:
      - auto_scheduler_external_trigger

concurrency:
  group: us-alpha-seeker-auto-scheduler-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily-run-gate:
    name: Daily Run Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
      reason: ${{ steps.guard.outputs.reason }}
      market_date: ${{ steps.guard.outputs.market_date }}
    steps:
      - name: Check same-market-day Auto-Scheduler runs
        id: guard
        env:
          GH_TOKEN: ${{ secrets.MCP_GITHUB_TOKEN || secrets.GH_PAT || secrets.SIDECAR_DISPATCH_TOKEN || github.token }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
          TARGET_WORKFLOW: US Alpha Seeker Auto-Scheduler
          DUPLICATE_FRESHNESS_MIN: ${{ vars.AUTO_SCHEDULER_DUPLICATE_FRESHNESS_MIN || '180' }}
        run: |
          set -euo pipefail
          market_date="$(TZ=America/New_York date +%F)"
          since="$(node - <<'NODE'
          const parts = new Intl.DateTimeFormat("en-CA", {
            timeZone: "America/New_York",
            year: "numeric",
            month: "2-digit",
            day: "2-digit"
          }).formatToParts(new Date());
          const get = (type) => parts.find((part) => part.type === type)?.value;
          const marketDate = `${get("year")}-${get("month")}-${get("day")}`;
          const noonUtc = new Date(`${marketDate}T12:00:00Z`);
          const nyHour = Number(new Intl.DateTimeFormat("en-US", {
            timeZone: "America/New_York",
            hour: "2-digit",
            hour12: false
          }).format(noonUtc));
          const offsetHours = 12 - nyHour;
          console.log(new Date(`${marketDate}T00:00:00.000Z`).getTime() + offsetHours * 60 * 60 * 1000);
          NODE
          )"
          since_iso="$(node -e 'console.log(new Date(Number(process.argv[1])).toISOString())' "$since")"
          fresh_since_iso="$(node -e 'const min = Number(process.argv[1]); console.log(new Date(Date.now() - Math.max(1, min) * 60 * 1000).toISOString())' "${DUPLICATE_FRESHNESS_MIN:-180}")"
          echo "market_date=$market_date" >> "$GITHUB_OUTPUT"
          echo "[DAILY_GATE] marketDate=$market_date since=$since_iso freshSince=$fresh_since_iso duplicateFreshnessMin=${DUPLICATE_FRESHNESS_MIN:-180} currentRun=$GITHUB_RUN_ID force=${FORCE_RUN:-false}"

          if [ "${FORCE_RUN:-false}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=force_requested" >> "$GITHUB_OUTPUT"
            echo "[DAILY_GATE] force=true; allowing run"
            exit 0
          fi

          runs="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow "$TARGET_WORKFLOW" \
            --created ">=$since_iso" \
            --limit 30 \
            --json databaseId,status,conclusion,event,createdAt,url)"
          active_blocking="$(jq \
            --arg current "$GITHUB_RUN_ID" \
            '[.[] | select((.databaseId | tostring) != $current) | select(.status == "queued" or .status == "in_progress")] | length' <<< "$runs")"
          completed_success_ids="$(jq -r \
            --arg current "$GITHUB_RUN_ID" \
            --arg fresh_since "$fresh_since_iso" \
            '.[] | select((.databaseId | tostring) != $current) | select(.status == "completed" and .conclusion == "success" and .createdAt >= $fresh_since) | .databaseId' <<< "$runs")"
          pipeline_success_blocking=0
          if [ -n "$completed_success_ids" ]; then
            while IFS= read -r run_id; do
              [ -z "$run_id" ] && continue
              jobs_json="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json jobs 2>/dev/null || true)"
              if [ -z "$jobs_json" ]; then
                jobs_json='{"jobs":[]}'
              fi
              job_conclusion="$(jq -r '.jobs[]? | select(.name == "Alpha Seeking Pipeline") | .conclusion // empty' <<< "$jobs_json" | head -n 1 || true)"
              echo "[DAILY_GATE] candidate_run=$run_id alphaPipelineConclusion=${job_conclusion:-missing}"
              if [ "$job_conclusion" = "success" ]; then
                pipeline_success_blocking=$((pipeline_success_blocking + 1))
              fi
            done <<< "$completed_success_ids"
          fi
          blocking=$((active_blocking + pipeline_success_blocking))
          echo "[DAILY_GATE] freshness_blocking_runs=$blocking active_blocking=$active_blocking pipeline_success_blocking=$pipeline_success_blocking"
          if [ "$blocking" -gt 0 ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=fresh_same_market_day_run_exists" >> "$GITHUB_OUTPUT"
            echo "$runs" | jq -c --arg fresh_since "$fresh_since_iso" '.[] | {databaseId,status,conclusion,event,createdAt,activeBlocking:(.status == "queued" or .status == "in_progress"),recentSuccessCandidate:(.status == "completed" and .conclusion == "success" and .createdAt >= $fresh_since),url}'
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "reason=no_fresh_same_market_day_run" >> "$GITHUB_OUTPUT"

  alpha-mining:
    name: Alpha Seeking Pipeline
    needs: daily-run-gate
    if: needs.daily-run-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120 # 비용 절감을 위한 타임아웃 설정 (120분으로 증설)
    
    env:
      
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      # AI Keys
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      API_KEY: ${{ secrets.API_KEY || secrets.GEMINI_API_KEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      HUGGINGFACE_API_BASE_URL: ${{ vars.HUGGINGFACE_API_BASE_URL || 'https://router.huggingface.co/hf-inference/models' }}
      VITE_HUGGINGFACE_API_BASE_URL: ${{ vars.HUGGINGFACE_API_BASE_URL || 'https://router.huggingface.co/hf-inference/models' }}
      HUGGINGFACE_FINBERT_MODEL: ${{ vars.HUGGINGFACE_FINBERT_MODEL || 'ProsusAI/finbert' }}
      VITE_HUGGINGFACE_FINBERT_MODEL: ${{ vars.HUGGINGFACE_FINBERT_MODEL || 'ProsusAI/finbert' }}
      HUGGINGFACE_SUMMARY_MODEL: ${{ vars.HUGGINGFACE_SUMMARY_MODEL || 'facebook/bart-large-cnn' }}
      VITE_HUGGINGFACE_SUMMARY_MODEL: ${{ vars.HUGGINGFACE_SUMMARY_MODEL || 'facebook/bart-large-cnn' }}
      HUGGINGFACE_ENABLE_SMOKE_TEST: ${{ vars.HUGGINGFACE_ENABLE_SMOKE_TEST || 'false' }}
      VITE_HUGGINGFACE_ENABLE_SMOKE_TEST: ${{ vars.HUGGINGFACE_ENABLE_SMOKE_TEST || 'false' }}
      HUGGINGFACE_SMOKE_STRICT: ${{ vars.HUGGINGFACE_SMOKE_STRICT || 'false' }}
      VITE_HUGGINGFACE_SMOKE_STRICT: ${{ vars.HUGGINGFACE_SMOKE_STRICT || 'false' }}
      HUGGINGFACE_ENABLE_ADVISORY: ${{ vars.HUGGINGFACE_ENABLE_ADVISORY || 'false' }}
      VITE_HUGGINGFACE_ENABLE_ADVISORY: ${{ vars.HUGGINGFACE_ENABLE_ADVISORY || 'false' }}
      HUGGINGFACE_ADVISORY_MAX_CANDIDATES: ${{ vars.HUGGINGFACE_ADVISORY_MAX_CANDIDATES || '6' }}
      VITE_HUGGINGFACE_ADVISORY_MAX_CANDIDATES: ${{ vars.HUGGINGFACE_ADVISORY_MAX_CANDIDATES || '6' }}
      HUGGINGFACE_ADVISORY_REQUIRE_HEADLINE: ${{ vars.HUGGINGFACE_ADVISORY_REQUIRE_HEADLINE || 'true' }}
      VITE_HUGGINGFACE_ADVISORY_REQUIRE_HEADLINE: ${{ vars.HUGGINGFACE_ADVISORY_REQUIRE_HEADLINE || 'true' }}
      HUGGINGFACE_BLEND_ENABLED: ${{ vars.HUGGINGFACE_BLEND_ENABLED || 'false' }}
      VITE_HUGGINGFACE_BLEND_ENABLED: ${{ vars.HUGGINGFACE_BLEND_ENABLED || 'false' }}
      HUGGINGFACE_BLEND_WEIGHT: ${{ vars.HUGGINGFACE_BLEND_WEIGHT || '0.25' }}
      VITE_HUGGINGFACE_BLEND_WEIGHT: ${{ vars.HUGGINGFACE_BLEND_WEIGHT || '0.25' }}
      HUGGINGFACE_BLEND_MAX_DELTA: ${{ vars.HUGGINGFACE_BLEND_MAX_DELTA || '8' }}
      VITE_HUGGINGFACE_BLEND_MAX_DELTA: ${{ vars.HUGGINGFACE_BLEND_MAX_DELTA || '8' }}
      HUGGINGFACE_BLEND_POSITIVE_SCALE: ${{ vars.HUGGINGFACE_BLEND_POSITIVE_SCALE || '1.0' }}
      VITE_HUGGINGFACE_BLEND_POSITIVE_SCALE: ${{ vars.HUGGINGFACE_BLEND_POSITIVE_SCALE || '1.0' }}
      HUGGINGFACE_BLEND_NEGATIVE_SCALE: ${{ vars.HUGGINGFACE_BLEND_NEGATIVE_SCALE || '1.2' }}
      VITE_HUGGINGFACE_BLEND_NEGATIVE_SCALE: ${{ vars.HUGGINGFACE_BLEND_NEGATIVE_SCALE || '1.2' }}
      HUGGINGFACE_BLEND_MIN_ARTICLE_COUNT: ${{ vars.HUGGINGFACE_BLEND_MIN_ARTICLE_COUNT || '2' }}
      VITE_HUGGINGFACE_BLEND_MIN_ARTICLE_COUNT: ${{ vars.HUGGINGFACE_BLEND_MIN_ARTICLE_COUNT || '2' }}
      HUGGINGFACE_BLEND_MAX_NEWS_AGE_HOURS: ${{ vars.HUGGINGFACE_BLEND_MAX_NEWS_AGE_HOURS || '24' }}
      VITE_HUGGINGFACE_BLEND_MAX_NEWS_AGE_HOURS: ${{ vars.HUGGINGFACE_BLEND_MAX_NEWS_AGE_HOURS || '24' }}
      HUGGINGFACE_EARNINGS_WINDOW_ENABLED: ${{ vars.HUGGINGFACE_EARNINGS_WINDOW_ENABLED || 'true' }}
      VITE_HUGGINGFACE_EARNINGS_WINDOW_ENABLED: ${{ vars.HUGGINGFACE_EARNINGS_WINDOW_ENABLED || 'true' }}
      HUGGINGFACE_EARNINGS_WINDOW_BLOCK_DAYS: ${{ vars.HUGGINGFACE_EARNINGS_WINDOW_BLOCK_DAYS || '1' }}
      VITE_HUGGINGFACE_EARNINGS_WINDOW_BLOCK_DAYS: ${{ vars.HUGGINGFACE_EARNINGS_WINDOW_BLOCK_DAYS || '1' }}
      HUGGINGFACE_EARNINGS_WINDOW_REDUCE_DAYS: ${{ vars.HUGGINGFACE_EARNINGS_WINDOW_REDUCE_DAYS || '3' }}
      VITE_HUGGINGFACE_EARNINGS_WINDOW_REDUCE_DAYS: ${{ vars.HUGGINGFACE_EARNINGS_WINDOW_REDUCE_DAYS || '3' }}
      HUGGINGFACE_EARNINGS_WINDOW_REDUCE_FACTOR: ${{ vars.HUGGINGFACE_EARNINGS_WINDOW_REDUCE_FACTOR || '0.3' }}
      VITE_HUGGINGFACE_EARNINGS_WINDOW_REDUCE_FACTOR: ${{ vars.HUGGINGFACE_EARNINGS_WINDOW_REDUCE_FACTOR || '0.3' }}
      HUGGINGFACE_TIMEOUT_MS: ${{ vars.HUGGINGFACE_TIMEOUT_MS || '4500' }}
      VITE_HUGGINGFACE_TIMEOUT_MS: ${{ vars.HUGGINGFACE_TIMEOUT_MS || '4500' }}
      HUGGINGFACE_RETRY: ${{ vars.HUGGINGFACE_RETRY || '1' }}
      VITE_HUGGINGFACE_RETRY: ${{ vars.HUGGINGFACE_RETRY || '1' }}
      GEMINI_PRIMARY_MODEL: ${{ vars.GEMINI_PRIMARY_MODEL }}
      GEMINI_FALLBACK_MODEL: ${{ vars.GEMINI_FALLBACK_MODEL }}
      GEMINI_FAST_MODEL: ${{ vars.GEMINI_FAST_MODEL }}
      GEMINI_LITE_MODEL: ${{ vars.GEMINI_LITE_MODEL }}
      VITE_GEMINI_PRIMARY_MODEL: ${{ vars.GEMINI_PRIMARY_MODEL }}
      VITE_GEMINI_FALLBACK_MODEL: ${{ vars.GEMINI_FALLBACK_MODEL }}
      VITE_GEMINI_FAST_MODEL: ${{ vars.GEMINI_FAST_MODEL }}
      VITE_GEMINI_LITE_MODEL: ${{ vars.GEMINI_LITE_MODEL }}
      VITE_FUND_ROIC_DEBT_MODE: ${{ vars.VITE_FUND_ROIC_DEBT_MODE }}
      VITE_FUND_ROIC_STRICT_COVERAGE_MIN: ${{ vars.VITE_FUND_ROIC_STRICT_COVERAGE_MIN }}
      VITE_STAGE6_ADAPTIVE_CURRENT_ENTRY_ENABLED: ${{ vars.VITE_STAGE6_ADAPTIVE_CURRENT_ENTRY_ENABLED || 'false' }}
      VITE_STAGE6_CURRENT_ENTRY_STOP_RECALC_ENABLED: ${{ vars.VITE_STAGE6_CURRENT_ENTRY_STOP_RECALC_ENABLED || 'false' }}
      VITE_STAGE6_ACTIONABLE_VERDICTS: ${{ vars.VITE_STAGE6_ACTIONABLE_VERDICTS || 'BUY,STRONG_BUY,STRONGBUY' }}
      VITE_STAGE6_SPECULATIVE_BUY_EXECUTABLE_WAIVER: ${{ vars.VITE_STAGE6_SPECULATIVE_BUY_EXECUTABLE_WAIVER || 'false' }}
      VITE_STAGE6_BREAKOUT_RETEST_PROOF_PROMOTION_ENABLED: ${{ vars.VITE_STAGE6_BREAKOUT_RETEST_PROOF_PROMOTION_ENABLED || 'false' }}
      VITE_BUILD_SOURCE_REPOSITORY: ${{ github.repository }}
      VITE_BUILD_SOURCE_WORKFLOW: ${{ github.workflow }}
      VITE_BUILD_SOURCE_RUN_ID: ${{ github.run_id }}
      VITE_BUILD_SOURCE_SHA: ${{ github.sha }}
      VITE_BUILD_SOURCE_REF: ${{ github.ref_name }}
      VITE_BUILD_SOURCE_EVENT_NAME: ${{ github.event_name }}
      
      # Data Provider Keys
      RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
      FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
      FMP_KEY: ${{ secrets.FMP_KEY }}
      TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
      ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
      GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
      GDRIVE_ROOT_FOLDER_ID: ${{ vars.GDRIVE_ROOT_FOLDER_ID || secrets.GDRIVE_ROOT_FOLDER_ID }}
      GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_ROOT_FOLDER_ID || vars.GDRIVE_ROOT_FOLDER_ID || secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID || secrets.GDRIVE_ROOT_FOLDER_ID }}
      VITE_GDRIVE_ROOT_FOLDER_ID: ${{ vars.VITE_GDRIVE_ROOT_FOLDER_ID || vars.GDRIVE_ROOT_FOLDER_ID || secrets.GDRIVE_ROOT_FOLDER_ID }}
      
      # Telegram
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_SIMULATION_CHAT_ID: ${{ secrets.TELEGRAM_SIMULATION_CHAT_ID }}

      # Approval Gateway
      TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
      PAPER_MODE: ${{ vars.PAPER_MODE || 'true' }}
      VITE_PAPER_MODE: ${{ vars.PAPER_MODE || 'true' }}
      APPROVAL_REQUIRED: ${{ vars.APPROVAL_REQUIRED || 'true' }}
      VITE_APPROVAL_REQUIRED: ${{ vars.APPROVAL_REQUIRED || 'true' }}      

      # GitHub Dispatch (Stage3 -> Harvester)
      GITHUB_TOKEN: ${{ secrets.MCP_GITHUB_TOKEN || secrets.GH_PAT || secrets.SIDECAR_DISPATCH_TOKEN || github.token }}
      GITHUB_PAT: ${{ vars.GITHUB_TOKEN || secrets.MCP_GITHUB_TOKEN || secrets.GH_PAT || secrets.SIDECAR_DISPATCH_TOKEN || github.token }}
      
      # Google Drive OAuth
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
      GDRIVE_ACCESS_TOKEN: ${{ secrets.GDRIVE_ACCESS_TOKEN }}
      SIDECAR_DISPATCH_REPO: pungking/alpha-exec-engine

    steps:
      - name: 1. 소스 코드 가져오기 (Checkout)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.MCP_GITHUB_TOKEN || secrets.GH_PAT || secrets.SIDECAR_DISPATCH_TOKEN || github.token }}

      - name: 2. Node.js 환경 설정
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: 2.1 한글 캡처 폰트 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk fonts-noto-color-emoji fontconfig
          fc-cache -fv

      - name: 3. 의존성 패키지 설치
        # npm ci 대신 npm install을 사용하여 package-lock.json 불일치 문제 해결
        run: npm install

      - name: 3.05 Symbol-agnostic runtime guard
        run: npm run ops:safety:symbol-agnostic

      - name: 3.06 Gemini env smoke
        run: GEMINI_SMOKE_REQUIRE_ALIASES=true npm run ops:gemini:smoke

      - name: 3.1 Puppeteer Chrome 설치
        run: npx puppeteer browsers install chrome

      - name: 4. 프로덕션 빌드 생성
        run: npm run build

      - name: 5. 가상 서버 실행 (Preview Mode)
        # 백그라운드(&)에서 3000번 포트로 서버를 띄웁니다.
        run: npm run preview -- --port 3000 &
      
      - name: 6. 서버 준비 대기
        run: |
          echo "Waiting for localhost:3000..."
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done'
          echo "Server is ready! Starting automation..."

      - name: 6.5 Evidence workspace 초기화
        run: |
          rm -rf state/stage3-audit-source state/stage4-audit-source state/stage5-audit-source state/stage6-audit-source
          rm -f \
            docs/STAGE3_5_METHODOLOGY_AUDIT.md \
            docs/STAGE3_5_QUANT_QUALITY_AUDIT.md \
            docs/STAGE3_6_FULL_STAGE_AUDIT.md \
            docs/STAGE6_BLOCKER_ROOT_CAUSE_AUDIT.md \
            docs/STAGE6_EXECUTION_GATE_AUDIT_2026-05-09.md \
            docs/STAGE6_FRESH_FOCUS_AUDIT.md \
            docs/STAGE6_POLICY_LANE_AUDIT_2026-05-29.md \
            docs/STAGE6_WEAK_PILLAR_RUNTIME_AUDIT.md
          mkdir -p state
          echo "[EVIDENCE_INIT] stale tracked audit docs removed from runner workspace"

      - name: 7. 자동화 스크립트 실행 (Puppeteer)
        id: automation
        env:
          DAILY_GATE_SHOULD_RUN: ${{ needs.daily-run-gate.outputs.should_run }}
          DAILY_GATE_REASON: ${{ needs.daily-run-gate.outputs.reason }}
          DAILY_GATE_MARKET_DATE: ${{ needs.daily-run-gate.outputs.market_date }}
        run: |
          set +e
          AUTOMATION_PHASE=started node scripts/write-auto-scheduler-run-status.mjs
          npm run automate
          exit_code=$?
          AUTOMATION_PHASE=completed AUTOMATION_EXIT_CODE="$exit_code" node scripts/write-auto-scheduler-run-status.mjs
          exit "$exit_code"

      - name: 7.01 Auto-Scheduler run status evidence
        if: always()
        env:
          AUTOMATION_PHASE: post_step
          AUTOMATION_OUTCOME: ${{ steps.automation.outcome || 'not_started' }}
          AUTOMATION_CONCLUSION: ${{ steps.automation.conclusion || 'not_started' }}
          DAILY_GATE_SHOULD_RUN: ${{ needs.daily-run-gate.outputs.should_run }}
          DAILY_GATE_REASON: ${{ needs.daily-run-gate.outputs.reason }}
          DAILY_GATE_MARKET_DATE: ${{ needs.daily-run-gate.outputs.market_date }}
        run: node scripts/write-auto-scheduler-run-status.mjs

      - name: Audit Evidence | Export Stage3-6 artifacts
        if: success()
        env:
          STAGE_ARTIFACT_EXPORT_STAGE4_LIMIT: "5"
          STAGE_ARTIFACT_EXPORT_STAGE6_LIMIT: "30"
        run: npm run ops:stage-artifacts:export

      - name: Audit Stage3-5 | Methodology
        if: success()
        run: npm run ops:stage3-5:methodology:audit

      - name: Audit Stage3-5 | Quant quality
        if: success()
        run: npm run ops:stage3-5:quant:audit

      - name: Audit Stage7 | Timestamped outcome ledger
        if: success()
        run: npm run ops:stage7:outcomes

      - name: Audit Stage3-5 | OOS and transaction cost evidence
        if: success()
        run: npm run ops:stage3-5:oos-cost:audit

      - name: Audit Stage6 Policy | Execution gate
        if: success()
        run: npm run ops:stage6:exec:audit

      - name: Audit Stage6 Policy | Blocker root cause
        if: success()
        run: npm run ops:stage6:blocker-root-cause:audit

      - name: Audit Stage6 Formula | Evidence
        if: success()
        env:
          STAGE6_EXPECTED_SOURCE_SHA: ${{ github.sha }}
          STAGE6_FOCUS_AUDIT_ENFORCE_FRESH_CONTRACT: "true"
        run: npm run ops:stage6:fresh-focus:audit

      - name: Audit Stage6 Formula | Producer backlog
        if: success()
        env:
          STAGE6_FORMULA_TUNING_BACKLOG_EXPECTED_SOURCE_SHA: ${{ github.sha }}
          STAGE6_FORMULA_TUNING_BACKLOG_ENFORCE_FRESH_SOURCE: "true"
        run: npm run ops:stage6:formula-tuning-backlog

      - name: Audit Stage6 Formula | Runtime proof
        if: success()
        env:
          STAGE6_RUNTIME_FORMULA_PROOF_EXPECTED_SOURCE_SHA: ${{ github.sha }}
        run: npm run ops:stage6:runtime-formula-contract:proof

      - name: Audit Stage6 Formula | Producer tuning 2
        if: success()
        run: npm run ops:stage6:producer-tuning-2:audit

      - name: Audit Stage6 Formula | Backlog alignment
        if: success()
        run: npm run ops:stage6:formula-audit-backlog:align

      - name: Audit Stage6 Policy | Lane classification
        if: success()
        run: npm run ops:stage6:policy-lane:audit

      - name: Audit Stage6 Policy | Weak pillar runtime
        if: success()
        run: npm run ops:stage6:weak-pillar:audit

      - name: Audit Stage6 Policy | Quality trend
        if: success()
        run: npm run ops:stage6:quality-trend:audit

      - name: Audit Stage3-6 | Full-stage lineage
        if: success()
        run: npm run ops:stage3-6:full:audit

      - name: Audit Stage3-6 | Runtime formula goal
        if: success()
        run: npm run ops:stage6:runtime-formula-goal:status

      - name: Dispatch Guard | Stage6 holiday safety
        id: stage6_holiday_safety
        if: success()
        run: npm run ops:stage6:holiday-safety

      - name: Dispatch Guard | Stage6 flag parity
        if: success()
        run: npm run ops:stage6:flag-parity:assert

      - name: Audit Stage3-6 | Group summary
        if: success()
        run: npm run ops:stage3-6:audit-group-summary

      - name: Dispatch | Stage6 payload extract
        id: stage6_dispatch_meta
        if: success()
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const outputPath = process.env.GITHUB_OUTPUT;
          const fallback = {
            stage6File: "",
            stage6Hash: "",
            sourceRunId: process.env.GITHUB_RUN_ID || ""
          };
          let payload = fallback;
          if (fs.existsSync("stage6-dispatch-payload.json")) {
            try {
              const parsed = JSON.parse(fs.readFileSync("stage6-dispatch-payload.json", "utf8"));
              payload = {
                stage6File: String(parsed?.stage6File || ""),
                stage6Hash: String(parsed?.stage6Hash || ""),
                sourceRunId: String(parsed?.sourceRunId || fallback.sourceRunId),
                holidayGeneratedStage6Safety: parsed?.holidayGeneratedStage6Safety || null
              };
            } catch (error) {
              console.log(`[WARN] stage6-dispatch-payload.json parse failed: ${error?.message || error}`);
            }
          } else {
            console.log("[WARN] stage6-dispatch-payload.json not found; using fallback payload");
          }
          const safety = payload.holidayGeneratedStage6Safety || {};
          const sidecarDispatchAllowed = safety.sidecarDispatchAllowed !== false;
          fs.appendFileSync(outputPath, `stage6_file=${payload.stage6File}\n`);
          fs.appendFileSync(outputPath, `stage6_hash=${payload.stage6Hash}\n`);
          fs.appendFileSync(outputPath, `source_run_id=${payload.sourceRunId}\n`);
          fs.appendFileSync(outputPath, `sidecar_dispatch_allowed=${sidecarDispatchAllowed ? "true" : "false"}\n`);
          fs.appendFileSync(outputPath, `holiday_safety_status=${String(safety.status || "unknown")}\n`);
          fs.appendFileSync(outputPath, `market_date=${String(safety.marketDate || "")}\n`);
          console.log(`[DISPATCH_PREP] file=${payload.stage6File || "N/A"} hash=${(payload.stage6Hash || "N/A").slice(0, 12)} sourceRun=${payload.sourceRunId || "N/A"} sidecarDispatchAllowed=${sidecarDispatchAllowed} holidaySafety=${safety.status || "unknown"} marketDate=${safety.marketDate || "N/A"}`);
          NODE

      - name: 7F.2 Dispatch | Sidecar dry-run repository_dispatch
        if: success() && steps.stage6_dispatch_meta.outputs.sidecar_dispatch_allowed == 'true'
        env:
          SIDECAR_DISPATCH_TOKEN: ${{ vars.GITHUB_TOKEN || secrets.MCP_GITHUB_TOKEN || secrets.GH_PAT || secrets.SIDECAR_DISPATCH_TOKEN || github.token }}
          STAGE6_FILE: ${{ steps.stage6_dispatch_meta.outputs.stage6_file }}
          STAGE6_HASH: ${{ steps.stage6_dispatch_meta.outputs.stage6_hash }}
          SOURCE_RUN_ID: ${{ steps.stage6_dispatch_meta.outputs.source_run_id }}
          SIDECAR_FALLBACK_WORKFLOW: ${{ vars.SIDECAR_WATCHDOG_TARGET_WORKFLOW || 'dry-run.yml' }}
          SIDECAR_DISPATCH_REF: ${{ vars.SIDECAR_WATCHDOG_BRANCH || 'main' }}
        run: |
          node - <<'NODE'
          (async () => {
            const token = String(process.env.SIDECAR_DISPATCH_TOKEN || "").trim();
            if (!token) {
              console.log("[WARN] dispatch token is not set (GITHUB_TOKEN|MCP_GITHUB_TOKEN|GH_PAT|SIDECAR_DISPATCH_TOKEN); skip repository_dispatch.");
              process.exit(0);
            }

            const repo = String(process.env.SIDECAR_DISPATCH_REPO || "").trim();
            if (!repo.includes("/")) {
              console.log(`[WARN] SIDECAR_DISPATCH_REPO is invalid: ${repo || "N/A"}; skip repository_dispatch.`);
              process.exit(0);
            }

            const [owner, name] = repo.split("/", 2);
            const body = {
              event_type: "stage6_result_created",
              client_payload: {
                stage6File: process.env.STAGE6_FILE || "",
                stage6Hash: process.env.STAGE6_HASH || "",
                sourceRunId: process.env.SOURCE_RUN_ID || process.env.GITHUB_RUN_ID || "",
                sourceRepo: process.env.GITHUB_REPOSITORY || "",
                sourceWorkflow: process.env.GITHUB_WORKFLOW || "",
                sourceSha: process.env.GITHUB_SHA || ""
              }
            };

            const headers = {
              Accept: "application/vnd.github+json",
              Authorization: `Bearer ${token}`,
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json"
            };
            const retryStatuses = new Set([408, 429, 500, 502, 503, 504]);
            const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const dispatchEventWithRetry = async () => {
              const url = `https://api.github.com/repos/${owner}/${name}/dispatches`;
              let lastErr = null;
              for (let attempt = 1; attempt <= 3; attempt += 1) {
                const response = await fetch(url, {
                  method: "POST",
                  headers,
                  body: JSON.stringify(body)
                });
                if (response.ok) {
                  return;
                }
                const text = await response.text();
                const retryable = retryStatuses.has(response.status);
                lastErr = new Error(
                  `repository_dispatch failed attempt=${attempt} status=${response.status} retryable=${retryable} body=${text.slice(0, 300)}`
                );
                if (!retryable || attempt === 3) break;
                await delay(attempt * 1200);
              }
              throw lastErr || new Error("repository_dispatch failed: unknown_error");
            };

            const fallbackWorkflowDispatch = async () => {
              const workflowFile = String(process.env.SIDECAR_FALLBACK_WORKFLOW || "dry-run.yml").trim() || "dry-run.yml";
              const ref = String(process.env.SIDECAR_DISPATCH_REF || "main").trim() || "main";
              const url = `https://api.github.com/repos/${owner}/${name}/actions/workflows/${encodeURIComponent(workflowFile)}/dispatches`;
              const response = await fetch(url, {
                method: "POST",
                headers,
                body: JSON.stringify({ ref })
              });
              if (!response.ok) {
                const text = await response.text();
                throw new Error(`fallback workflow_dispatch failed (${response.status}): ${text.slice(0, 300)}`);
              }
              console.log(`[DISPATCH_FALLBACK_OK] repo=${repo} workflow=${workflowFile} ref=${ref}`);
            };

            try {
              await dispatchEventWithRetry();
              console.log(
                `[DISPATCH_OK] repo=${repo} event=stage6_result_created file=${body.client_payload.stage6File || "N/A"} hash=${String(body.client_payload.stage6Hash || "N/A").slice(0, 12)} sourceRun=${body.client_payload.sourceRunId || "N/A"}`
              );
            } catch (error) {
              console.warn(`[DISPATCH_WARN] repository_dispatch failed, fallback to workflow_dispatch: ${error?.message || error}`);
              await fallbackWorkflowDispatch();
            }
          })().catch((error) => {
            console.error(`[DISPATCH_ERR] ${error?.message || error}`);
            process.exit(1);
          });
          NODE

      - name: 7G.1 Notion | Pipeline sync (Stock/AI/Watchlist)
        if: always()
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_STOCK_SCORES: ${{ vars.NOTION_DB_STOCK_SCORES || secrets.NOTION_DB_STOCK_SCORES }}
          NOTION_DB_AI_ALPHA_ANALYSIS: ${{ vars.NOTION_DB_AI_ALPHA_ANALYSIS || secrets.NOTION_DB_AI_ALPHA_ANALYSIS }}
          NOTION_DB_WATCHLIST: ${{ vars.NOTION_DB_WATCHLIST || secrets.NOTION_DB_WATCHLIST }}
          NOTION_PIPELINE_SYNC_ENABLED: ${{ vars.NOTION_PIPELINE_SYNC_ENABLED || 'true' }}
          NOTION_PIPELINE_SYNC_REQUIRED: ${{ vars.NOTION_PIPELINE_SYNC_REQUIRED || 'false' }}
          NOTION_PIPELINE_SYNC_PAYLOAD_PATH: notion-pipeline-sync-payload.json
        run: node scripts/sync-pipeline-notion.mjs

      - name: 7H.1 Notion | Daily snapshot sync
        if: always()
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_DAILY_SNAPSHOT: ${{ vars.NOTION_DB_DAILY_SNAPSHOT || secrets.NOTION_DB_DAILY_SNAPSHOT }}
          NOTION_GHA_SYNC_ENABLED: ${{ vars.NOTION_GHA_SYNC_ENABLED || 'true' }}
          NOTION_GHA_SYNC_REQUIRED: ${{ vars.NOTION_GHA_SYNC_REQUIRED || 'false' }}
          GHA_JOB_STATUS: ${{ job.status }}
          STAGE6_FILE: ${{ steps.stage6_dispatch_meta.outputs.stage6_file }}
          STAGE6_HASH: ${{ steps.stage6_dispatch_meta.outputs.stage6_hash }}
        run: node scripts/sync-gha-notion.mjs

      - name: 7H.2 Notion | Pipeline sync summary
        if: always()
        run: |
          if [ -f "state/notion-pipeline-sync.json" ]; then
            node -e '
              const fs=require("node:fs");
              const p="state/notion-pipeline-sync.json";
              const j=JSON.parse(fs.readFileSync(p,"utf8"));
              const r=j.results||{};
              const pick=(x)=>x&&typeof x==="object"?`${(x.created||0)+(x.updated||0)} (c${x.created||0}/u${x.updated||0})`:"N/A";
              const lines=[
                "## Notion Pipeline Sync",
                `- status: \`${j.status || "unknown"}\``,
                `- reason: \`${j.reason || "n/a"}\``,
                `- rows: \`${j.rowCount ?? "n/a"}\``,
                `- stock_scores: \`${pick(r.stockScores)}\``,
                `- ai_alpha_analysis: \`${pick(r.aiAnalysis)}\``,
                `- portfolio_watchlist: \`${pick(r.watchlist)}\``
              ];
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join("\n")}\n`);
            '
          else
            echo "## Notion Pipeline Sync" >> "$GITHUB_STEP_SUMMARY"
            echo "- result: no sync artifact generated" >> "$GITHUB_STEP_SUMMARY"
          fi

